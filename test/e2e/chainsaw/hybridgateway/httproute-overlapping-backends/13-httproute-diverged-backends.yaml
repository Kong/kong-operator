---
# Scenario C: preview service now selects a different deployment (distinct pods).
# Both backendRefs are present but endpoints no longer overlap — expect 2 KongTargets.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ($httproute_name)
  namespace: ($http_route_namespace)
  labels:
    chainsaw/test: ($test_name)
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ($gateway_name)
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /echo
          method: GET
      backendRefs:
        - name: ($echo_active_service_name)
          port: 1027
          weight: 1
        - name: ($echo_preview_service_name)
          port: 1027
          weight: 1
