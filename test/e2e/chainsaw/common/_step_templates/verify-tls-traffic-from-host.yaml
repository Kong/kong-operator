# Template for verifying TLS traffic from the host to the gateway.
#
# Required bindings:
#   - gateway_name: Name of the Gateway.
#   - gateway_namespace: Namespace of the Gateway.
#   - listener_tls_port: Port of the gateway listener for TLS traffic.
#   - request_sni: Server name used to establish the TLS connection.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: StepTemplate
metadata:
  name: verify-https-traffic-from-host
spec:
  try:
    # 1. Dynamically discover the Gateway's Proxy IP
    - script:
        env:
          - name: GATEWAY_NAME
            value: ($gateway_name)
          - name: GATEWAY_NAMESPACE
            value: ($gateway_namespace)
        content: |
          bash ../../common/scripts/proxy_ip_address.sh
        outputs:
          - name: proxy_ip
            value: (json_parse($stdout).proxy_ip_address)
        check:
          (json_parse($stdout).proxy_ip_address != null): true
          (json_parse($stdout).proxy_ip_address != ''): true

    # 2. Perform the HTTPS connectivity and TLS check
    - script:
        env:
          - name: PROXY_IP
            value: ($proxy_ip)
          - name: SNI
            value: ($request_sni)
          - name: PROXY_PORT
            value: to_string($listener_tls_port)
        content: |
          bash ../../common/scripts/host_connectivity_test_with_tls_traffic.sh
        check:
          (to_string(json_parse($stdout).success) == 'true'): true