kind: KonnectAPIAuthConfiguration
apiVersion: konnect.konghq.com/v1alpha1
metadata:
  name: konnect-api-auth-1
  namespace: default
spec:
  type: token
  token: kpat_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  # For a complete list of available API URLs see:https://docs.konghq.com/konnect/network/#kong-gateway-hostnames
  serverURL: us.api.konghq.tech
---
kind: AIGatewayControlPlane
apiVersion: konnect.konghq.com/v1alpha1
metadata:
  name: ai-gw-cp-1
  namespace: default
spec:
  apiSpec:
    name: ai-gw-cp-1
    displayName: My AI Gateway
    description: AI Gateway control plane
    labels:
      app: test1
  konnect:
    authRef:
      name: konnect-api-auth-1
---
kind: AIGatewayModel
apiVersion: konnect.konghq.com/v1alpha1
metadata:
  name: ai-gw-model-1
  namespace: default
spec:
  aiGatewayRef:
    type: namespacedRef
    namespacedRef:
      name: ai-gw-cp-1
  apiSpec:
    type: api
    api:
      name: gpt-4o-mini
      displayName: GPT-4o Mini
      enabled: Enabled
      formats:
        - type: openai
      capabilities:
        - files
      config:
        model: {}
        route: {}
      labels:
        app: test1
        env: test
      targets:
        - name: gpt-4o-mini
          provider: openai-provider
          config:
            type: openai
            openai: {}
