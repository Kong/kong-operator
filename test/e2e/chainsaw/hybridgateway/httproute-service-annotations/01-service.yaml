apiVersion: v1
kind: Service
metadata:
  name: echo-with-annotations
  namespace: ($namespace)
  annotations:
    konghq.com/path: "/echo"
    konghq.com/protocol: "https"
    konghq.com/tls-verify: "true"
    konghq.com/tls-verify-depth: "2"
    konghq.com/connect-timeout: "5000"
    konghq.com/read-timeout: "5000"
    konghq.com/write-timeout: "5000"
    konghq.com/retries: "3"
    konghq.com/host-header: "fake.com"
spec:
  selector:
    app: ($echo_deployment_name)
  ports:
    - port: 80
      targetPort: 1027
      protocol: TCP
