apiVersion: chainsaw.kyverno.io/v1alpha1
kind: StepTemplate
metadata:
  name: assert-kong-route
spec:
  try:
    - script:
        env:
         - name: NAMESPACE
           value: ($namespace)
         - name: RESOURCE_TYPE
           value: ($resource_type)
         - name: GATEWAY_NAME
           value: ($gateway_name)
         - name: GATEWAY_NAMESPACE
           value: ($gateway_namespace)
         - name: HTTP_ROUTE_NAME
           value: ($http_route_name)
         - name: HTTP_ROUTE_NAMESPACE
           value: ($http_route_namespace)
        content: |
          bash ../../common/scripts/kongResource_name.sh
        outputs:
          - name: kong_service_name
            value: (json_parse($stdout).name)
    - script:
        env:
         - name: NAMESPACE
           value: ($namespace)
         - name: RESOURCE_TYPE
           value: kongroutes.configuration.konghq.com
         - name: GATEWAY_NAME
           value: ($gateway_name)
         - name: GATEWAY_NAMESPACE
           value: ($gateway_namespace)
         - name: HTTP_ROUTE_NAME
           value: ($http_route_name)
         - name: HTTP_ROUTE_NAMESPACE
           value: ($http_route_namespace)
         - name: EXPECTED_SERVICE_NAME
           value: ($kong_service_name)
         - name: REQUIRED_CONDITION_TYPE
           value: Programmed
         - name: REQUIRED_CONDITION_STATUS
           value: "True"
        content: |
          bash ../../common/scripts/kongResource_name.sh
    - assert:
        resource:
          apiVersion: configuration.konghq.com/v1alpha1
          kind: KongRoute
          metadata:
            namespace: ($namespace)
            (labels."gateway-operator.konghq.com/managed-by" == 'HTTPRoute'): true
            (contains(annotations."gateway-operator.konghq.com/hybrid-routes" || '', join('/', [($http_route_namespace), ($http_route_name)]))): true
            (annotations."gateway-operator.konghq.com/hybrid-gateways" == join('/', [($gateway_namespace), ($gateway_name)])): true
          spec:
            paths: ($route_paths)
            strip_path: ($strip_path)
            preserve_host: ($preserve_host)
            serviceRef:
              namespacedRef:
                name: ($kong_service_name)
          status:
            (conditions[?type == 'Programmed']):
              - status: 'True'
                reason: Programmed
            (conditions[?type == 'KongServiceRefValid']):
              - status: 'True'
                reason: Valid
            (conditions[?type == 'APIAuthResolvedRef']):
              - status: 'True'
                reason: ResolvedRef
            (conditions[?type == 'APIAuthValid']):
              - status: 'True'
                reason: Valid
            # Assert Konnect fields are present
            konnect:
              (controlPlaneID != nil): true
              (id != nil): true
              (serviceID != nil): true
