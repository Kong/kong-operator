---
kind: TLSRoute
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: (join('-', [($test_name), 'echo-tls-route']))
  namespace: ($namespace)
  labels:
    chainsaw/test: ($test_name)
spec:
  hostnames:
    - "echo.kong.test"
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ($gateway_name)
  rules:
      backendRefs:
        - name: (join('-', [($test_name), 'echo']))
          port: 1030
