kind: Portal
apiVersion: konnect.konghq.com/v1alpha1
metadata:
  name: portal1
  namespace: default
spec:
  konnect:
    authRef:
      name: konnect-api-auth
  apiSpec:
    name: portal1
    authenticationEnabled: Enabled
---
kind: PortalEmailConfig
apiVersion: konnect.konghq.com/v1alpha1
metadata:
  name: portal1
  namespace: default
spec:
  portalRef:
    type: namespacedRef
    namespacedRef:
      name: portal1
  apiSpec:
    domainName: example.com
    fromEmail: noreply@example.com
    fromName: Example Developer Portal
    replyToEmail: support@example.com
