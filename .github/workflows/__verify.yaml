name: verify

on:
  workflow_call: {}

permissions:
  contents: read
  issues: read
  pull-requests: read

env:
  MISE_VERBOSE: 1
  MISE_DEBUG: 1

jobs:
  verify:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(vars.GHA_EXTENDED_TIMEOUT_MINUTES || 20) }}
    env:
      CRD_BREAKING_CHANGES_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
      ACK_CRD_BREAKING_CHANGE_LABEL: ack_crd_breaking_change
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: go-fix
            make-target: verify.go-fix
            fetch_depth: 1
            lint-cache: false
          - name: manifests
            make-target: verify.manifests
            fetch_depth: 1
            lint-cache: false
          - name: generators
            make-target: verify.generators
            fetch_depth: 1
            lint-cache: true
          - name: crd-breaking-changes
            make-target: verify.crd-breaking-changes
            fetch_depth: 0
            lint-cache: false
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
      with:
        egress-policy: audit
    - name: Checkout repository
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        fetch-depth: ${{ matrix.fetch_depth }}

    - name: Setup go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        go-version-file: go.mod
        cache: false

    - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      with:
        install: false

    - run: |
        {
          echo "GO_MOD_CACHE=$(go env GOMODCACHE)"
          echo "GO_BUILD_CACHE=$(go env GOCACHE)"
        } >> $GITHUB_ENV

    # Restore-only, reusing the shared `go-build-*` cache written by the `build` job in
    # tests.yaml. We never save here to avoid creating additional caches.
    - name: Restore go build cache
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v4
      with:
        path: |
          ${{ env.GO_MOD_CACHE }}
          ${{ env.GO_BUILD_CACHE }}
        key: go-build-${{ runner.os }}-${{ runner.arch }}-go-${{ hashFiles('**/go.mod') }}
        restore-keys: |
          go-build-${{ runner.os }}-${{ runner.arch }}-go-

    # Only the `generators` target runs golangci-lint (via generate -> generate.lint-fix).
    # Restore-only, reusing the shared `go-lint-*` cache written by the lint job in
    # __lint.yaml. Key/paths must match __lint.yaml exactly for the restore to hit.
    - if: ${{ matrix.lint-cache }}
      run: echo "GOLANGCI_LINT_CACHE=$(make golangci-lint-cache-path | tail -1)" >> $GITHUB_ENV

    - name: Restore lint cache
      if: ${{ matrix.lint-cache }}
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v4
      with:
        path: |
          ${{ env.GO_MOD_CACHE }}
          ${{ env.GO_BUILD_CACHE }}
          ${{ env.GOLANGCI_LINT_CACHE }}
        key: go-lint-${{ runner.os }}-${{ runner.arch }}-go-${{ hashFiles('**/go.mod') }}
        restore-keys: |
          go-lint-${{ runner.os }}-${{ runner.arch }}-go-

    - name: Check CRD breaking-change acknowledgement
      if: ${{ matrix.name == 'crd-breaking-changes' && github.event_name == 'pull_request' }}
      env:
        GH_TOKEN: ${{ github.token }}
        PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number || '' }}
      run: |
        set -euo pipefail

        # A CRD breaking change is acknowledged by adding the label to the PR. This check
        # only runs for pull_request events, so there is always a single PR to inspect.
        ack="false"
        if [[ -n "${PULL_REQUEST_NUMBER}" ]]; then
          ack="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/issues/${PULL_REQUEST_NUMBER}/labels" \
            --jq 'any(.[].name; . == env.ACK_CRD_BREAKING_CHANGE_LABEL)')"
        fi

        echo "ACK_CRD_BREAKING_CHANGE=${ack}" >> "${GITHUB_ENV}"

    # The CRD breaking-change check compares against a PR base and is acknowledged via a PR
    # label, so it can only run in a pull_request context. There is no way to acknowledge a
    # breaking change on a bare commit (push/merge_group), so skip it outside of PRs.
    - if: ${{ matrix.name != 'crd-breaking-changes' || github.event_name == 'pull_request' }}
      run: make ${{ matrix.make-target }}
