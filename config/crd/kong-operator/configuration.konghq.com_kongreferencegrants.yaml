---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    kubernetes-configuration.konghq.com/channels: kong-operator
    kubernetes-configuration.konghq.com/version: v2.1.0
  name: kongreferencegrants.configuration.konghq.com
spec:
  group: configuration.konghq.com
  names:
    categories:
    - kong
    kind: KongReferenceGrant
    listKind: KongReferenceGrantList
    plural: kongreferencegrants
    singular: kongreferencegrant
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          KongReferenceGrant identifies kinds of resources in other namespaces that are
          trusted to reference the specified kinds of resources in the same namespace
          as the policy.

          Each KongReferenceGrant can be used to represent a unique trust relationship.
          Additional Reference Grants can be used to add to the set of trusted
          sources of inbound references for the namespace they are defined within.

          All cross-namespace references in Kong APIs require a KongReferenceGrant.

          KongReferenceGrant is a form of runtime verification allowing users to assert
          which cross-namespace object references are permitted.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec defines the desired state of KongReferenceGrant.
            properties:
              from:
                description: |-
                  From describes the trusted namespaces and kinds that can reference the
                  resources described in "To". Each entry in this list MUST be considered
                  to be an additional place that references can be valid from, or to put
                  this another way, entries MUST be combined using OR.
                items:
                  description: ReferenceGrantFrom describes trusted namespaces and
                    kinds.
                  properties:
                    group:
                      description: Group is the group of the referent.
                      maxLength: 253
                      minLength: 1
                      pattern: ^$|^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                      type: string
                    kind:
                      allOf:
                      - minLength: 1
                      - minLength: 1
                      description: Kind is the kind of the referent.
                      maxLength: 63
                      pattern: ^[a-zA-Z]([-a-zA-Z0-9]*[a-zA-Z0-9])?$
                      type: string
                    namespace:
                      description: Namespace is the namespace of the referent.
                      maxLength: 63
                      pattern: ^$|^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                      type: string
                    namespaceSelector:
                      description: NamespaceSelector selects namespaces of the referent.
                      properties:
                        matchExpressions:
                          description: matchExpressions is a list of label selector
                            requirements. The requirements are ANDed.
                          items:
                            description: |-
                              A label selector requirement is a selector that contains values, a key, and an operator that
                              relates the key and values.
                            properties:
                              key:
                                description: key is the label key that the selector
                                  applies to.
                                type: string
                              operator:
                                description: |-
                                  operator represents a key's relationship to a set of values.
                                  Valid operators are In, NotIn, Exists and DoesNotExist.
                                type: string
                              values:
                                description: |-
                                  values is an array of string values. If the operator is In or NotIn,
                                  the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                  the values array must be empty. This array is replaced during a strategic
                                  merge patch.
                                items:
                                  type: string
                                type: array
                                x-kubernetes-list-type: atomic
                            required:
                            - key
                            - operator
                            type: object
                          type: array
                          x-kubernetes-list-type: atomic
                        matchLabels:
                          additionalProperties:
                            type: string
                          description: |-
                            matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                            map is equivalent to an element of matchExpressions, whose key field is "key", the
                            operator is "In", and the values array contains only "value". The requirements are ANDed.
                          type: object
                      type: object
                      x-kubernetes-map-type: atomic
                  required:
                  - group
                  - kind
                  type: object
                  x-kubernetes-validations:
                  - message: Only KongConsumer, KongConsumerGroup, KongRoute, KongCertificate,
                      KongCACertificate, KongDataPlaneClientCertificate, KongService,
                      KongUpstream, KongTarget, KongKey, KongKeySet, KongVault, KongPluginBinding
                      and KongSNI kinds are supported for 'configuration.konghq.com'
                      group
                    rule: self.group != 'configuration.konghq.com' || self.kind in
                      [ 'KongConsumer', 'KongConsumerGroup', 'KongRoute', 'KongService',
                      'KongCertificate', 'KongCACertificate', 'KongDataPlaneClientCertificate',
                      'KongUpstream', 'KongTarget', 'KongKey', 'KongKeySet', 'KongVault',
                      'KongPluginBinding', 'KongSNI']
                  - message: Only GatewayConfiguration kind is supported for 'gateway-operator.konghq.com'
                      group
                    rule: self.group != 'gateway-operator.konghq.com' || self.kind
                      in [ 'GatewayConfiguration' ]
                  - message: namespace must be empty and namespaceSelector must be
                      unset for KongVault; either namespace or namespaceSelector must
                      be set for other kinds
                    rule: 'self.kind == ''KongVault'' ? (!has(self.__namespace__)
                      || self.__namespace__ == "") && !has(self.namespaceSelector)
                      : (has(self.__namespace__) && self.__namespace__ != "") || has(self.namespaceSelector)'
                  - message: namespace and namespaceSelector are mutually exclusive
                    rule: '!((has(self.__namespace__) && self.__namespace__ != "")
                      && has(self.namespaceSelector))'
                  - message: namespaceSelector must contain at least one matchLabels
                      or matchExpressions entry
                    rule: '!has(self.namespaceSelector) || (has(self.namespaceSelector.matchLabels)
                      && size(self.namespaceSelector.matchLabels) > 0) || (has(self.namespaceSelector.matchExpressions)
                      && size(self.namespaceSelector.matchExpressions) > 0)'
                maxItems: 16
                minItems: 1
                type: array
                x-kubernetes-list-type: atomic
              to:
                description: |-
                  To describes the resources that may be referenced by the resources
                  described in "From". Each entry in this list MUST be considered to be an
                  additional place that references can be valid to, or to put this another
                  way, entries MUST be combined using OR.
                items:
                  description: |-
                    ReferenceGrantTo describes what Kinds are allowed as targets of the
                    references.
                  properties:
                    group:
                      description: Group is the group of the referent.
                      maxLength: 253
                      minLength: 1
                      pattern: ^$|^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                      type: string
                    kind:
                      allOf:
                      - minLength: 1
                      - minLength: 1
                      description: Kind is the kind of the referent.
                      maxLength: 63
                      pattern: ^[a-zA-Z]([-a-zA-Z0-9]*[a-zA-Z0-9])?$
                      type: string
                    name:
                      description: |-
                        Name is the name of the referent. When unspecified, this policy
                        refers to all resources of the specified Group and Kind in the local
                        namespace.
                      maxLength: 253
                      minLength: 1
                      type: string
                  required:
                  - group
                  - kind
                  type: object
                  x-kubernetes-validations:
                  - message: Only 'Secret' kind is supported for 'core' group
                    rule: .self.group != 'core' || .self.kind == 'Secret'
                  - message: Only 'KonnectGatewayControlPlane', 'KonnectAPIAuthConfiguration',
                      'Portal', 'KonnectEventGateway', 'EventGatewayBackendCluster',
                      'EventGatewayListener' and 'EventGatewayVirtualCluster' kinds
                      are supported for 'konnect.konghq.com' group
                    rule: .self.group != 'konnect.konghq.com' || .self.kind in ['KonnectGatewayControlPlane',
                      'KonnectAPIAuthConfiguration', 'Portal', 'KonnectEventGateway',
                      'EventGatewayBackendCluster', 'EventGatewayListener', 'EventGatewayVirtualCluster']
                  - message: Only 'KongPlugin', 'KongService', 'KongCertificate',
                      'KongCACertificate' and 'KongUpstream' kinds are supported for
                      'configuration.konghq.com' group
                    rule: .self.group != 'configuration.konghq.com' || .self.kind
                      in ['KongPlugin', 'KongService', 'KongCertificate', 'KongCACertificate',
                      'KongUpstream']
                maxItems: 16
                minItems: 1
                type: array
                x-kubernetes-list-type: atomic
            required:
            - from
            - to
            type: object
        type: object
    served: true
    storage: true
    subresources: {}
