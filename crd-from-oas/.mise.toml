[tasks.test-unit]
description = "Run unit tests"
# Update test paths below if more API groups are added
run = '''
go test -v -count 1 ${GOTESTFLAGS} ./...
'''

[tasks.lint]
description = "Run linters"
run = '''
golangci-lint run -v ${GOLANGCI_LINT_FLAGS}
'''

[tasks.generate-api]
description = "Generate Kubernetes Go API from OpenAPI spec"
# NOTE we get the openapi.yaml file from the sdk-konnect-go module which is expected
# to match the version required by the parent kong-operator module.
# This ensures that we use the same OpenAPI spec as the one used to generate the
# SDK which should help avoid potential discrepancies between the API and the SDK.
run = '''
set -eu
go mod download
sdk_konnect_go_dir="$(cd .. && go mod download -json "github.com/Kong/sdk-konnect-go" | jq -re '.Dir')"
if [ -z "$sdk_konnect_go_dir" ]; then
       echo "failed to resolve github.com/Kong/sdk-konnect-go module directory" >&2
       exit 1
fi
export INPUT_FILE="${sdk_konnect_go_dir}/openapi.yaml"
export OUTPUT_DIR="../api/"
export CONFIG_FILE="config.yaml"
go run .
'''
depends = [ "clean" ]
depends_post = [ "generate-list-funcs", "generate-deepcopy" ]

[tasks.generate-list-funcs]
description = "Generate list helper funcs for API list types"
dir = ".."
run = "go run ./scripts/apitypes-funcs"

[tasks.generate-crds]
description = "Generate CRDs using controller-gen"
dir = ".."
run = "make generate.crds"

[tasks.generate-deepcopy]
description = "Generate deepcopy methods"
dir = ".."
run = "mise r generate-deepcopy"

[tasks.generate]
description = "Generate everything"
run = [
       { task = "generate-api" },
       { task = "generate-crds" },
       { task = "generate-deepcopy" },
]
