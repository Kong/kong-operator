# KongConsumerGroup cross-namespace ControlPlaneRef test.
#
# Scenario A: All resources in the same namespace — baseline, no grants needed.
#
# Scenario B: CP and AuthConfig co-located in ns-B, KongConsumerGroup in ns-A.
#   Only a ConsumerGroup->CP grant is needed.
#
# Scenario C: CP in ns-B, AuthConfig in ns-C (separate namespace), KongConsumerGroup in ns-A.
#   Both ConsumerGroup->CP AND CP->AuthConfig grants are required.
#
# Scenario D: starting from Scenario B (Programmed=True), deleting the
#   KongReferenceGrant reverts the ConsumerGroup to ResolvedRefs=False/RefNotPermitted.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: kongconsumergroup-cross-namespace
spec:
  description: |
    Scenario A: All resources (KongConsumerGroup, KonnectGatewayControlPlane,
    KonnectAPIAuthConfiguration) in the same namespace. No grants needed; baseline sanity check.

    Scenario B: KongConsumerGroup (ns-A) -> KonnectGatewayControlPlane (ns-B) -> KonnectAPIAuthConfiguration (ns-B).
    CP and AuthConfig co-located: only one ConsumerGroup->CP grant is needed.

    Steps:
      1. Create ns-B and provision KonnectAPIAuthConfiguration + KonnectGatewayControlPlane there.
      2. Create KongConsumerGroup in ns-A pointing to the cross-namespace CP.
      3. Assert it has a negative condition (no grant yet).
      4. Create the KongReferenceGrant in ns-B.
      5. Assert it becomes Programmed.
      6. Explicitly delete Konnect-registered resources before chainsaw tears down the auth namespace.

    Scenario C: KongConsumerGroup (ns-A) -> KonnectGatewayControlPlane (ns-B) -> KonnectAPIAuthConfiguration (ns-C).
    CP and AuthConfig in different namespaces: both ConsumerGroup->CP AND CP->AuthConfig grants are required.

    Steps:
      1. Create ns-C; provision AuthConfig in ns-C, CP in ns-B with cross-namespace authRef.
      2. Assert CP has APIAuthResolvedRef=False (missing CP->AuthConfig grant).
      3. Create KongConsumerGroup in ns-A; add ConsumerGroup->CP grant.
      4. Assert ConsumerGroup is not Programmed (CP not programmed yet).
      5. Add CP->AuthConfig grant; assert CP and ConsumerGroup both become Programmed.
      6. Explicitly delete Konnect-registered resources before chainsaw tears down the auth namespaces.

    Scenario D: starting from Scenario B (Programmed=True), deleting the
    KongReferenceGrant reverts the ConsumerGroup to ResolvedRefs=False/RefNotPermitted
    immediately, validating that the KongReferenceGrant watch is in place.

  bindings:
    # Common bindings.
    - name: konnect_token
      value: (env('KONNECT_TOKEN'))
    - name: konnect_url
      value: (env('KONNECT_SERVER_URL') || 'eu.api.konghq.tech')
    # Namespace bindings (Scenario B and C).
    - name: cp_namespace
      value: (join('-', [$namespace, 'cp']))
    - name: auth_namespace
      value: (join('-', [$namespace, 'auth']))
    # Scenario A resource names (same namespace as test).
    - name: cp0_name
      value: (join('-', [$namespace, 'cp0']))
    - name: auth0_name
      value: (join('-', [$namespace, 'auth0-konnect-api-auth']))
    - name: cg0_name
      value: (join('-', [$namespace, 'cg0']))
    # Scenario B resource names (ConsumerGroup in test namespace, CP+AuthConfig in cp_namespace).
    - name: cp_name
      value: (join('-', [$namespace, 'cp']))
    - name: auth_name
      value: (join('-', [$namespace, 'konnect-api-auth']))
    - name: cg_name
      value: (join('-', [$namespace, 'cg']))
    # Scenario C resource names (CP in cp_namespace, AuthConfig in auth_namespace).
    - name: cp2_name
      value: (join('-', [$namespace, 'cp2']))
    - name: auth2_name
      value: (join('-', [$namespace, 'auth2-konnect-api-auth']))
    - name: cg2_name
      value: (join('-', [$namespace, 'cg2']))

  steps:
    # =========================================================================
    # Scenario A: All resources in the same namespace. No grants needed.
    # =========================================================================

    # Step 1: Create KonnectAPIAuthConfiguration in the test namespace.
    - name: 1-create-auth-config-same-ns
      description: Create KonnectAPIAuthConfiguration in the test namespace.
      bindings:
        - name: test_name
          value: (join('-', [$namespace, 'auth0']))
      use:
        template: ../../common/_step_templates/apply-assert-konnectAPIAuthConfiguration.yaml

    # Step 2: Create KonnectGatewayControlPlane in the test namespace.
    - name: 2-create-control-plane-same-ns
      description: Create KonnectGatewayControlPlane in the test namespace referencing auth config in the same namespace.
      bindings:
        - name: cp_name
          value: ($cp0_name)
        - name: cp_namespace
          value: ($namespace)
        - name: auth_name
          value: ($auth0_name)
      use:
        template: ../../common/_step_templates/apply-assert-konnectGatewayControlPlane.yaml

    # Step 3: Create KongConsumerGroup in the test namespace.
    # No grants are required since all resources share the same namespace.
    - name: 3-create-consumergroup-same-ns
      description: Create KongConsumerGroup in the test namespace (no grants needed).
      try:
        - apply:
            resource:
              apiVersion: configuration.konghq.com/v1beta1
              kind: KongConsumerGroup
              metadata:
                name: ($cg0_name)
                namespace: ($namespace)
              spec:
                name: ($cg0_name)
                controlPlaneRef:
                  type: konnectNamespacedRef
                  konnectNamespacedRef:
                    name: ($cp0_name)

    # Step 4: Assert ConsumerGroup is Programmed without any grants.
    - name: 4-assert-consumergroup-programmed-same-ns
      description: Assert KongConsumerGroup is Programmed (no grants needed for same namespace).
      timeouts:
        assert: 90s
      try:
        - assert:
            resource:
              apiVersion: configuration.konghq.com/v1beta1
              kind: KongConsumerGroup
              metadata:
                name: ($cg0_name)
                namespace: ($namespace)
              status:
                (conditions[?type == 'Programmed']):
                  - status: 'True'
                    reason: Programmed
                (conditions[?type == 'ControlPlaneRefValid']):
                  - status: 'True'
                    reason: Valid
                (conditions[?type == 'APIAuthResolvedRef']):
                  - status: 'True'
                    reason: ResolvedRef
                (conditions[?type == 'APIAuthValid']):
                  - status: 'True'
                    reason: Valid
                (konnect.controlPlaneID != null): true
                (konnect.id != null): true

    # Step 5: Cleanup scenario A resources in dependency order.
    - name: 5-cleanup-scenario-a
      description: Delete cg0 and CP0 in order; wait for each to be gone before proceeding.
      timeouts:
        delete: 120s
        error: 120s
      try:
        - delete:
            ref:
              apiVersion: configuration.konghq.com/v1beta1
              kind: KongConsumerGroup
              name: ($cg0_name)
              namespace: ($namespace)
        - error:
            resource:
              apiVersion: configuration.konghq.com/v1beta1
              kind: KongConsumerGroup
              metadata:
                name: ($cg0_name)
                namespace: ($namespace)
        - delete:
            ref:
              apiVersion: konnect.konghq.com/v1alpha2
              kind: KonnectGatewayControlPlane
              name: ($cp0_name)
              namespace: ($namespace)
        - error:
            resource:
              apiVersion: konnect.konghq.com/v1alpha2
              kind: KonnectGatewayControlPlane
              metadata:
                name: ($cp0_name)
                namespace: ($namespace)

    # =========================================================================
    # Scenario B: CP and AuthConfig in the same namespace (ns-B), ConsumerGroup in ns-A.
    # Only the ConsumerGroup->CP grant is needed.
    # =========================================================================

    # Step 6: Create namespace for KonnectGatewayControlPlane and KonnectAPIAuthConfiguration.
    - name: 6-create-cp-namespace
      description: Create namespace for KonnectGatewayControlPlane and KonnectAPIAuthConfiguration.
      bindings:
        - name: namespace_name
          value: ($cp_namespace)
      use:
        template: ../../common/_step_templates/apply-assert-namespace.yaml

    # Step 7: Create KonnectAPIAuthConfiguration in the CP namespace.
    - name: 7-create-auth-config
      description: Create KonnectAPIAuthConfiguration in the CP namespace.
      bindings:
        - name: test_name
          value: ($namespace)
        - name: namespace
          value: ($cp_namespace)
      use:
        template: ../../common/_step_templates/apply-assert-konnectAPIAuthConfiguration.yaml

    # Step 8: Create KonnectGatewayControlPlane in the CP namespace.
    - name: 8-create-control-plane
      description: Create KonnectGatewayControlPlane in the CP namespace referencing auth config in the same namespace.
      use:
        template: ../../common/_step_templates/apply-assert-konnectGatewayControlPlane.yaml

    # Step 9: Create KongConsumerGroup before any KongReferenceGrant exists.
    - name: 9-create-consumergroup-no-grant
      description: Create KongConsumerGroup before any grant exists.
      try:
        - apply:
            resource:
              apiVersion: configuration.konghq.com/v1beta1
              kind: KongConsumerGroup
              metadata:
                name: ($cg_name)
                namespace: ($namespace)
              spec:
                name: ($cg_name)
                controlPlaneRef:
                  type: konnectNamespacedRef
                  konnectNamespacedRef:
                    name: ($cp_name)
                    namespace: ($cp_namespace)

    # Step 10: Assert negative condition — ConsumerGroup ResolvedRefs=False.
    - name: 10-assert-negative-no-grant
      description: Assert ConsumerGroup ResolvedRefs=False/RefNotPermitted (no grant yet).
      try:
        - assert:
            resource:
              apiVersion: configuration.konghq.com/v1beta1
              kind: KongConsumerGroup
              metadata:
                name: ($cg_name)
                namespace: ($namespace)
              status:
                (conditions[?type == 'ResolvedRefs']):
                  - status: 'False'
                    reason: RefNotPermitted

    # Step 11: Create KongReferenceGrant allowing KongConsumerGroup (ns-A) -> KonnectGatewayControlPlane (ns-B).
    - name: 11-create-reference-grant
      description: Create KongReferenceGrant in cp_namespace allowing KongConsumerGroup from test namespace to reference KonnectGatewayControlPlane.
      bindings:
        - name: kong_reference_grant_name
          value: (join('-', [$namespace, 'cg-to-cp']))
        - name: kong_reference_grant_namespace
          value: ($cp_namespace)
        - name: from
          value:
            - group: configuration.konghq.com
              kind: KongConsumerGroup
              namespace: ($namespace)
        - name: to
          value:
            - group: konnect.konghq.com
              kind: KonnectGatewayControlPlane
      use:
        template: ../../common/_step_templates/apply-assert-kongreferencegrant.yaml

    # Step 12: Assert ConsumerGroup becomes Programmed after the grant is in place.
    - name: 12-assert-consumergroup-programmed
      description: Assert KongConsumerGroup is Programmed after the grant is added.
      timeouts:
        assert: 90s
      try:
        - assert:
            resource:
              apiVersion: configuration.konghq.com/v1beta1
              kind: KongConsumerGroup
              metadata:
                name: ($cg_name)
                namespace: ($namespace)
              status:
                (conditions[?type == 'ResolvedRefs']):
                  - status: 'True'
                    reason: ResolvedRefs
                (conditions[?type == 'ControlPlaneRefValid']):
                  - status: 'True'
                    reason: Valid
                (conditions[?type == 'APIAuthResolvedRef']):
                  - status: 'True'
                    reason: ResolvedRef
                (conditions[?type == 'APIAuthValid']):
                  - status: 'True'
                    reason: Valid
                (conditions[?type == 'Programmed']):
                  - status: 'True'
                    reason: Programmed
                (konnect.controlPlaneID != null): true
                (konnect.id != null): true

    # =========================================================================
    # Scenario D: delete the ConsumerGroup->CP grant and verify the ConsumerGroup
    # reverts to ResolvedRefs=False/RefNotPermitted (validates grant watch).
    # =========================================================================

    - name: 13-delete-cg-to-cp-grant
      description: Delete the ConsumerGroup->CP grant to verify the ConsumerGroup reverts to RefNotPermitted.
      try:
        - delete:
            ref:
              apiVersion: configuration.konghq.com/v1alpha1
              kind: KongReferenceGrant
              name: (join('-', [$namespace, 'cg-to-cp']))
              namespace: ($cp_namespace)

    - name: 14-assert-cg-reverts-to-not-permitted
      description: Assert ConsumerGroup transitions back to ResolvedRefs=False/RefNotPermitted after grant deletion.
      try:
        - assert:
            resource:
              apiVersion: configuration.konghq.com/v1beta1
              kind: KongConsumerGroup
              metadata:
                name: ($cg_name)
                namespace: ($namespace)
              status:
                (conditions[?type == 'ResolvedRefs']):
                  - status: 'False'
                    reason: RefNotPermitted

    - name: 15-recreate-cg-to-cp-grant
      description: Recreate the ConsumerGroup->CP grant so the consumer group can be deprovisioned cleanly during cleanup.
      bindings:
        - name: kong_reference_grant_name
          value: (join('-', [$namespace, 'cg-to-cp']))
        - name: kong_reference_grant_namespace
          value: ($cp_namespace)
        - name: from
          value:
            - group: configuration.konghq.com
              kind: KongConsumerGroup
              namespace: ($namespace)
        - name: to
          value:
            - group: konnect.konghq.com
              kind: KonnectGatewayControlPlane
      use:
        template: ../../common/_step_templates/apply-assert-kongreferencegrant.yaml

    # Step 16: Explicitly delete Konnect-registered resources in dependency order before chainsaw
    # tears down the namespace containing the KonnectAPIAuthConfiguration.
    # The cg-to-cp grant is deleted before the CP wait so it cannot be skipped
    # if the CP wait times out — it does not affect CP auth deprovisioning.
    - name: 16-cleanup-scenario-b
      description: |
        Delete cg and CP in order; wait for each to be gone.
        cg-to-cp grant is deleted before the CP wait (safe — does not affect CP auth deprovisioning).
      timeouts:
        delete: 120s
        error: 120s
      try:
        - delete:
            ref:
              apiVersion: configuration.konghq.com/v1beta1
              kind: KongConsumerGroup
              name: ($cg_name)
              namespace: ($namespace)
        - error:
            resource:
              apiVersion: configuration.konghq.com/v1beta1
              kind: KongConsumerGroup
              metadata:
                name: ($cg_name)
                namespace: ($namespace)
        - delete:
            ref:
              apiVersion: configuration.konghq.com/v1alpha1
              kind: KongReferenceGrant
              name: (join('-', [$namespace, 'cg-to-cp']))
              namespace: ($cp_namespace)
        - delete:
            ref:
              apiVersion: konnect.konghq.com/v1alpha2
              kind: KonnectGatewayControlPlane
              name: ($cp_name)
              namespace: ($cp_namespace)
        - error:
            resource:
              apiVersion: konnect.konghq.com/v1alpha2
              kind: KonnectGatewayControlPlane
              metadata:
                name: ($cp_name)
                namespace: ($cp_namespace)

    # =========================================================================
    # Scenario C: CP in cp_namespace (ns-B), AuthConfig in auth_namespace (ns-C).
    # Both ConsumerGroup->CP AND CP->AuthConfig grants are required.
    # =========================================================================

    # Step 14: Create a separate namespace for KonnectAPIAuthConfiguration (ns-C).
    - name: 17-create-auth-namespace
      description: Create separate auth namespace for KonnectAPIAuthConfiguration (different from CP namespace).
      bindings:
        - name: namespace_name
          value: ($auth_namespace)
      use:
        template: ../../common/_step_templates/apply-assert-namespace.yaml

    # Step 15: Create KonnectAPIAuthConfiguration in the auth namespace (ns-C).
    - name: 18-create-auth-config-cross-ns
      description: Create KonnectAPIAuthConfiguration in auth_namespace (ns-C, separate from CP namespace).
      bindings:
        - name: test_name
          value: (join('-', [$namespace, 'auth2']))
        - name: namespace
          value: ($auth_namespace)
      use:
        template: ../../common/_step_templates/apply-assert-konnectAPIAuthConfiguration.yaml

    # Step 16: Create CP2 in cp_namespace with cross-namespace authRef to auth_namespace.
    # Without a CP->AuthConfig grant this CP should not become Programmed.
    - name: 19-create-cp2-cross-ns-auth
      description: Create KonnectGatewayControlPlane in cp_namespace with cross-namespace authRef to auth_namespace.
      try:
        - apply:
            resource:
              apiVersion: konnect.konghq.com/v1alpha2
              kind: KonnectGatewayControlPlane
              metadata:
                name: ($cp2_name)
                namespace: ($cp_namespace)
              spec:
                createControlPlaneRequest:
                  name: ($cp2_name)
                konnect:
                  authRef:
                    name: ($auth2_name)
                    namespace: ($auth_namespace)

    # Step 17: Assert CP2 has APIAuthResolvedRef=False/RefNotPermitted (no CP->AuthConfig grant).
    - name: 20-assert-cp2-auth-grant-missing
      description: Assert CP2 has APIAuthResolvedRef=False/RefNotPermitted because no CP->AuthConfig grant exists.
      try:
        - assert:
            resource:
              apiVersion: konnect.konghq.com/v1alpha2
              kind: KonnectGatewayControlPlane
              metadata:
                name: ($cp2_name)
                namespace: ($cp_namespace)
              status:
                (conditions[?type == 'APIAuthResolvedRef']):
                  - status: 'False'
                    reason: RefNotPermitted

    # Step 18: Create KongConsumerGroup2 before CP2 is programmed.
    - name: 21-create-consumergroup2
      description: Create KongConsumerGroup2 referencing cp2.
      try:
        - apply:
            resource:
              apiVersion: configuration.konghq.com/v1beta1
              kind: KongConsumerGroup
              metadata:
                name: ($cg2_name)
                namespace: ($namespace)
              spec:
                name: ($cg2_name)
                controlPlaneRef:
                  type: konnectNamespacedRef
                  konnectNamespacedRef:
                    name: ($cp2_name)
                    namespace: ($cp_namespace)

    # Step 19: Add ConsumerGroup2->CP2 grant so cg2 can reference cp2 across namespaces.
    - name: 22-create-cg2-to-cp2-grant
      description: Create KongReferenceGrant in cp_namespace allowing cg2 from test namespace to reference cp2.
      bindings:
        - name: kong_reference_grant_name
          value: (join('-', [$namespace, 'cg2-to-cp2']))
        - name: kong_reference_grant_namespace
          value: ($cp_namespace)
        - name: from
          value:
            - group: configuration.konghq.com
              kind: KongConsumerGroup
              namespace: ($namespace)
        - name: to
          value:
            - group: konnect.konghq.com
              kind: KonnectGatewayControlPlane
      use:
        template: ../../common/_step_templates/apply-assert-kongreferencegrant.yaml

    # Step 20: Assert cg2 is still not Programmed.
    # CP2 is not Programmed (CP->AuthConfig grant missing), so cg2 is not Programmed.
    - name: 23-assert-cg2-not-programmed
      description: Assert cg2 ControlPlaneRefValid=False/NotProgrammed because CP->AuthConfig grant is still missing.
      try:
        - assert:
            resource:
              apiVersion: configuration.konghq.com/v1beta1
              kind: KongConsumerGroup
              metadata:
                name: ($cg2_name)
                namespace: ($namespace)
              status:
                (conditions[?type == 'Programmed']):
                  - status: 'False'
                (conditions[?type == 'ControlPlaneRefValid']):
                  - status: 'False'
                    reason: NotProgrammed

    # Step 21: Create CP2->AuthConfig2 grant in auth_namespace.
    - name: 24-create-cp2-to-auth2-grant
      description: Create KongReferenceGrant in auth_namespace allowing cp2 from cp_namespace to reference auth2.
      bindings:
        - name: kong_reference_grant_name
          value: (join('-', [$namespace, 'cp2-to-auth2']))
        - name: kong_reference_grant_namespace
          value: ($auth_namespace)
        - name: from
          value:
            - group: konnect.konghq.com
              kind: KonnectGatewayControlPlane
              namespace: ($cp_namespace)
        - name: to
          value:
            - group: konnect.konghq.com
              kind: KonnectAPIAuthConfiguration
      use:
        template: ../../common/_step_templates/apply-assert-kongreferencegrant.yaml

    # Step 22: Assert CP2 and cg2 both become Programmed.
    - name: 25-assert-all-programmed
      description: Assert CP2 and cg2 are both Programmed after both grants are in place.
      timeouts:
        assert: 90s
      try:
        - assert:
            resource:
              apiVersion: konnect.konghq.com/v1alpha2
              kind: KonnectGatewayControlPlane
              metadata:
                name: ($cp2_name)
                namespace: ($cp_namespace)
              status:
                (conditions[?type == 'APIAuthResolvedRef']):
                  - status: 'True'
                    reason: ResolvedRef
                (conditions[?type == 'APIAuthValid']):
                  - status: 'True'
                    reason: Valid
                (conditions[?type == 'Programmed']):
                  - status: 'True'
                    reason: Programmed
        - assert:
            resource:
              apiVersion: configuration.konghq.com/v1beta1
              kind: KongConsumerGroup
              metadata:
                name: ($cg2_name)
                namespace: ($namespace)
              status:
                (conditions[?type == 'ResolvedRefs']):
                  - status: 'True'
                    reason: ResolvedRefs
                (conditions[?type == 'ControlPlaneRefValid']):
                  - status: 'True'
                    reason: Valid
                (conditions[?type == 'APIAuthResolvedRef']):
                  - status: 'True'
                    reason: ResolvedRef
                (conditions[?type == 'APIAuthValid']):
                  - status: 'True'
                    reason: Valid
                (conditions[?type == 'Programmed']):
                  - status: 'True'
                    reason: Programmed
                (konnect.controlPlaneID != null): true
                (konnect.id != null): true

    # Step 23: Explicitly delete Konnect-registered resources in dependency order before chainsaw
    # tears down the namespaces containing the KonnectAPIAuthConfigurations.
    # cg2-to-cp2 is deleted before the CP wait (safe — does not affect CP auth deprovisioning).
    # cp2-to-auth2 is deleted last, after CP2 is fully deprovisioned.
    - name: 26-cleanup-scenario-c
      description: |
        Delete cg2 and CP2 in order; wait for each to be gone.
        cg2-to-cp2 grant is deleted before the CP wait (safe — does not affect CP auth deprovisioning).
        cp2-to-auth2 is deleted last, after CP2 is fully deprovisioned.
      timeouts:
        delete: 120s
        error: 120s
      try:
        - delete:
            ref:
              apiVersion: configuration.konghq.com/v1beta1
              kind: KongConsumerGroup
              name: ($cg2_name)
              namespace: ($namespace)
        - error:
            resource:
              apiVersion: configuration.konghq.com/v1beta1
              kind: KongConsumerGroup
              metadata:
                name: ($cg2_name)
                namespace: ($namespace)
        - delete:
            ref:
              apiVersion: configuration.konghq.com/v1alpha1
              kind: KongReferenceGrant
              name: (join('-', [$namespace, 'cg2-to-cp2']))
              namespace: ($cp_namespace)
        - delete:
            ref:
              apiVersion: konnect.konghq.com/v1alpha2
              kind: KonnectGatewayControlPlane
              name: ($cp2_name)
              namespace: ($cp_namespace)
        - error:
            resource:
              apiVersion: konnect.konghq.com/v1alpha2
              kind: KonnectGatewayControlPlane
              metadata:
                name: ($cp2_name)
                namespace: ($cp_namespace)
        - delete:
            ref:
              apiVersion: configuration.konghq.com/v1alpha1
              kind: KongReferenceGrant
              name: (join('-', [$namespace, 'cp2-to-auth2']))
              namespace: ($auth_namespace)

  catch:
    # Capture debug snapshot on test failure for CI debugging.
    - description: Capture debug snapshot
      script:
        env:
          - name: TEST_NAME
            value: kongconsumergroup-cross-namespace
          - name: NAMESPACE
            value: ($namespace)
          - name: ADDITIONAL_NAMESPACES
            value: (join(',', [$cp_namespace, $auth_namespace]))
          - name: OPERATOR_NAMESPACE
            value: kong-system
        content: |
          bash ../../common/scripts/debug_snapshot.sh
