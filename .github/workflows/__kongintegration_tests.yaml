name: kong integration tests

on:
  workflow_call: {}

permissions:
  contents: read

env:
  MISE_VERBOSE: 1
  MISE_DEBUG: 1

jobs:
  kongintegration-tests:
    timeout-minutes: ${{ fromJSON(vars.GHA_EXTENDED_TIMEOUT_MINUTES || 60) }}
    runs-on: ubuntu-latest
    name: ${{ matrix.name }}
    strategy:
      matrix:
        include:
          - name: enterprise
            enterprise: true
          - name: oss
            enterprise: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        id: setup-go
        with:
          go-version-file: go.mod
          cache: false
      - run: |
          echo "GO_MOD_CACHE=$(go env GOMODCACHE)" >> $GITHUB_ENV
          echo "GO_BUILD_CACHE=$(go env GOCACHE)" >> $GITHUB_ENV

      - uses: Kong/kong-license@c4decf08584f84ff8fe8e7cd3c463e0192f6111b # master @ 20250107
        id: license
        with:
          op-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: set kong oss version
        if: ${{ !matrix.enterprise }}
        run: |
          echo "TEST_KONG_IMAGE=kong" >> $GITHUB_ENV
          echo "TEST_KONG_TAG=$(yq -ojson -r '.kongintegration.kong-oss' < test/test_dependencies.yaml )" >> $GITHUB_ENV

      - name: set kong ee version
        if: ${{ matrix.enterprise }}
        run: |
          echo "TEST_KONG_IMAGE=kong/kong-gateway" >> $GITHUB_ENV
          echo "TEST_KONG_TAG=$(yq -ojson -r '.kongintegration.kong-ee' < test/test_dependencies.yaml )" >> $GITHUB_ENV

      - uses: jdx/mise-action@e79ddf65a11cec7b0e882bedced08d6e976efb2d # v3.6.2
        with:
          install: false

      - run: echo "GOTESTSUM_JUNITFILE=kongintegration-${{ matrix.name }}-tests.xml" >> $GITHUB_ENV
      # Share the cache key across all kongintegration tests since they all use the same dependencies.
      - run: echo "GO_CACHE_KEY=go-kongintegration-${{ runner.os }}-${{ runner.arch }}-go-${{ hashFiles('**/go.mod') }}" >> $GITHUB_ENV
      - run: echo "GO_CACHE_KEY_2=go-kongintegration-${{ runner.os }}-${{ runner.arch }}-go-" >> $GITHUB_ENV

      - name: Go cache main branch
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: |
            ${{ env.GO_MOD_CACHE }}
            ${{ env.GO_BUILD_CACHE }}
          key: ${{ env.GO_CACHE_KEY }}
          restore-keys: |
            ${{ env.GO_CACHE_KEY }}
            ${{ env.GO_CACHE_KEY_2 }}

      - name: Go cache (restore only for non-main branches)
        if: ${{ github.ref != 'refs/heads/main' }}
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: |
            ${{ env.GO_MOD_CACHE }}
            ${{ env.GO_BUILD_CACHE }}
          key: ${{ env.GO_CACHE_KEY }}
          restore-keys: |
            ${{ env.GO_CACHE_KEY }}
            ${{ env.GO_CACHE_KEY_2 }}

      - name: run kong integration tests
        run: make test.kongintegration
        env:
          GOTESTSUM_JUNITFILE: ${{ env.GOTESTSUM_JUNITFILE }}
          KONG_CUSTOM_DOMAIN: konghq.tech
          TEST_KONG_KONNECT_ACCESS_TOKEN: ${{ secrets.KONG_TEST_KONNECT_ACCESS_TOKEN }}
          KONG_LICENSE_DATA: ${{ steps.license.outputs.license }}
          TEST_KONG_ENTERPRISE: ${{ matrix.enterprise }}

      - name: collect test coverage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-kongintegration-${{ matrix.name }}
          path: coverage.*.out

      - name: collect test report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: tests-report-kongintegration-${{ matrix.name }}
          path: ${{ env.GOTESTSUM_JUNITFILE }}
