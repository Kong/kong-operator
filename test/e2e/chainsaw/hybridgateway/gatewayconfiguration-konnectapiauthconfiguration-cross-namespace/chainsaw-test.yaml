# GatewayConfiguration -> KonnectAPIAuthConfiguration cross namespace referencec test scenario.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: gwconf-apiauthconf-cross-namespace

spec:
  description: |
    This test validates that the hybrid gateway controller correctly
    processes cross namespace reference from GatewayConfiguration to
    KonnectAPIAuthConfiguration when KongReferenceGrant grants the reference.

  timeouts:
    apply: 120s
    assert: 120s
    delete: 120s
    exec: 120s
    cleanup: 120s

  bindings:
    - name: test_name
      value: gwconf-apiauthconf-cross-namespace
    - name: konnect_api_auth_namespace
      value:  (join('-', ['kong', 'gwconf-apiauthconf-x-ns-konnect-auth', (env('GITHUB_RUN_ID') || env('TEST_ID') || 'local')]))
    - name: konnect_token
      value: (env('KONNECT_TOKEN'))
    - name: konnect_url
      value: (env('KONNECT_SERVER_URL') || 'eu.api.konghq.tech')
    - name: gateway_namespace
      value: (join('-', ['kong', 'gwconf-apiauthconf-x-ns-gateway', (env('GITHUB_RUN_ID') || env('TEST_ID') || 'local')]))
    - name: gateway_image
      value: (env('GATEWAY_IMAGE') || 'kong/kong-gateway:3.12')
    - name: listener_http_port
      value: 80
    - name: http_route_name
      value: (join('-', [($test_name), 'echo-route']))
    - name: http_route_namespace
      value: ($gateway_namespace)
    - name: echo_service_name
      value: (join('-', [($test_name), 'echo']))

  steps:
  # Step 1: Create 2 namespaces where KonnectAPIAuthConfiguration and GatewayConfiguration are in separately
    - name: create-namespaces
      description: Create 2 namespaces for KonnectAPIAuthConfiguration and GatewayConfiguration
      try:
        - apply:
            file: 00-namespaces.yaml
        - assert:
           file: 00-namespaces.yaml
  # Step 2: Create KonnectAPIAuthConfiguration in a namespace
    - name: create-konnect-api-auth-confugration
      description: Create a KonnectAPIAuthConfiguration in a namespace
      bindings:
        - name: namespace
          value: ($konnect_api_auth_namespace)
      use:
        template: ../common/_step_templates/apply-assert-konnectAPIAuthConfiguration.yaml
    # Step 3: Create a KongReferenceGrant to allow KonnectGatewayControlPlane in the other namespace to reference the KonnectAPIAuthConfiguration
    - name: create-kong-reference-grant-konnect-cp
      description: Create a KongReferenceGrant to allow KonnectGatewayControlPlane in the other namespace to reference the KonnectAPIAuthConfiguration
      bindings:
        - name: test_name
          value: gwconf-apiauthconf-cross-namespace-for-konnectcp
        - name: namespace
          value: ($konnect_api_auth_namespace)
        - name: from_group
          value: konnect.konghq.com
        - name: from_kind
          value: KonnectGatewayControlPlane
        - name: from_namespace
          value: ($gateway_namespace)
        - name: to_group
          value: konnect.konghq.com
        - name: to_kind
          value: KonnectAPIAuthConfiguration
      use:
        template: ../common/_step_templates/apply-assert-kong-reference-grant.yaml
    # Step 4: Create the GatewayConfiguration that defines the hybrid gateway setup  in the other namespace.
    - name: create-gateway-configuration
      description: Create GatewayConfiguration for the test.
      bindings:
        - name: namespace
          value: ($gateway_namespace)
      use:
        template: ../common/_step_templates/apply-assert-gatewayConfiguration.yaml

    # Step 5: Create the GatewayClass that will be used by the Gateway.
    - name: create-gateway-class
      description: Create GatewayClass for the test.
      bindings:
        - name: namespace
          value: ($gateway_namespace)
      use:
        template: ../common/_step_templates/apply-assert-gatewayClass.yaml
    
    # Step 6: Create the Gateway in the namespace of GatewayConfiguration.
    - name: Create-gateway
      description: Create Gateway in the namespace of GatewayConfiguration for the test.
      bindings:
        - name: namespace
          value: ($gateway_namespace)
      use:
        template: ../common/_step_templates/apply-assert-gateway.yaml
    
    # Step 7: Verify that the KonnectGatewayControlPlane is created and synchronized with Konnect.
    - name: Assert-konnect-gateway-control-plane
      description: Assert that the KonnectGatewayControlplane resource is created and synchronized.
      bindings:
        - name: namespace
          value: ($gateway_namespace)
      use:
        template: ../common/_step_templates/assert-konnectGatewayControlPlane.yaml

    
    # Step 8: Create echo services and deployments as the backend of HTTPRoute.
    - name: Create-echo-service
      description: Create and assert an echo service to route traffic to.
      bindings:
        - name: namespace
          value: ($gateway_namespace)
      use:
        template: ../common/_step_templates/apply-assert-echoService.yaml

    # Step 9: Create HTTPRoute to route traffic to the echo service in the namespace of the Gateway.
    - name: Create-httproute-echo
      description: Create HTTPRoute to route traffic to the echo service.
      bindings:
        - name: namespace
          value: ($gateway_namespace)
        - name: route_path
          value: "/echo-x-ns-gwconf-konnect-api-auth"
      try:
        - apply:
            file: 01-httproute-echo.yaml
        - assert:
            file: 02-httproute-echo-assert.yaml
      catch:
        - description: Dump HTTPRoutes
          get:
            apiVersion: gateway.networking.k8s.io
            kind: HTTPRoute
            namespace: ($namespace)
            format: yaml
            
    # Step 10: Verify connectivity from host.
    - name: Verify-HTTP-traffic-from-host
      description: Verify that HTTP traffic can be routed through the gateway to the echo service from the host.
      use:
        template: ../common/_step_templates/verify-http-traffic-from-host-by-ip.yaml
      bindings:
        - name: gateway_name
          value: (join('-', [($test_name), 'gateway']))
        - name: route_path
          value: "/echo-x-ns-gwconf-konnect-api-auth"
        
  # Global catch block - runs on any step failure to help debug.
  catch:
    - describe:
        apiVersion: gateway.networking.k8s.io/v1
        kind: GatewayClass
        name: (join('-', [($test_name), 'gateway-class']))
        showEvents: true
    
    - describe:
        apiVersion: gateway-operator.konghq.com/v2beta1
        kind: GatewayConfiguration
        name: (join('-', [($test_name), 'gateway-configuration']))
        namespace: ($gateway_namespace)
        showEvents: true
    
    - describe:
        apiVersion: gateway-operator.konghq.com/v1alpha1
        kind: KonnectAPIAuthConfiguration
        name: (join('-', [($test_name), 'konnect-api-auth']))
        namespace: ($konnect_api_auth_namespace)
        showEvents: true
    
    - describe:
        apiVersion: gateway-operator.konghq.com/v1beta1
        kind: KonnectGatewayControlPlane
        namespace: ($gateway_namespace)
        showEvents: true
    
    - describe:
        apiVersion: gateway.networking.k8s.io/v1
        kind: Gateway
        name: (join('-', [($test_name), 'gateway']))
        namespace: ($gateway_namespace)
        showEvents: true

    - describe:
        apiVersion: configuration.konghq.com/v1alpha1
        kind: KongReferenceGrant
        namespace: ($konnect_api_auth_namespace)
    
    - describe:
        apiVersion: apps/v1
        kind: Deployment
        namespace: ($gateway_namespace)
        showEvents: true
    
    - describe:
        apiVersion: v1
        kind: Pod
        namespace: ($gateway_namespace)
        showEvents: true
    
    - describe:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        name: (join('-', [($test_name), 'echo-route']))
        namespace: ($gateway_namespace)
        showEvents: true
    
    - describe:
        apiVersion: configuration.konghq.com/v1alpha1
        kind: KongService
        namespace: ($gateway_namespace)
        showEvents: true
    
    - describe:
        apiVersion: configuration.konghq.com/v1alpha1
        kind: KongRoute
        namespace: ($gateway_namespace)
        showEvents: true
    
    - describe:
        apiVersion: configuration.konghq.com/v1alpha1
        kind: KongUpstream
        namespace: ($gateway_namespace)
        showEvents: true
    
    - describe:
        apiVersion: configuration.konghq.com/v1alpha1
        kind: KongTarget
        namespace: ($gateway_namespace)
        showEvents: true
    
    - describe:
        apiVersion: v1
        kind: Service
        name: (join('-', [($test_name), 'echo']))
        namespace: ($gateway_namespace)
        showEvents: true
