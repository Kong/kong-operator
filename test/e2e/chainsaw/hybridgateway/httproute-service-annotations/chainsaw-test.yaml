# Test: HTTPRoute with Service annotations.
# Verifies that the hybrid gateway controller applies correct values
# to KongService when a backend Service is annotated with Service annotations.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: httproute-service-annotations
spec:
  description: |
    This test validates that the hybrid gateway controller correctly processes
    the annotations on Services referenced by HTTPRoute.
    When a Service is annotated with:
    - konghq.com/path: <path>
    - konghq.com/protocol: <protocol>
    - konghq.com/tls-verify: <bool>
    - konghq.com/tls-verify-depth: <depth>
    - konghq.com/connect-timeout: <timeout>
    - konghq.com/read-timeout: <timeout>
    - konghq.com/write-timeout: <timeout>
    - konghq.com/retries: <retries>
    - konghq.com/host-header: <host>
    the value should be applied to the generated KongService.

  bindings:
    # Common bindings (reused from basic-httproute pattern).
    - name: test_name
      value: ($namespace)
    - name: konnect_token
      value: (env('KONNECT_TOKEN'))
    - name: konnect_api_auth_namespace
      value: ($namespace)
    - name: sni_hostname
      value: (join('.', ['*', ($namespace), 'example.com']))
    - name: fqdn
      value: (join('.', ['echo', ($namespace), 'example.com']))
    - name: cert_secret_name
      value: test-tls-secret
    - name: cert_secret_namespace
      value: ($namespace)
    - name: listener_https_port
      value: 443
    - name: listener_http_port
      value: 80
    - name: konnect_url
      value: (env('KONNECT_SERVER_URL') || 'eu.api.konghq.tech')
    - name: auth_secret_name
      value: (join('-', [($namespace), 'konnect-auth-secret']))
    - name: auth_secret_namespace
      value: ($namespace)
    - name: konnect_auth_name
      value: (join('-', [($namespace), 'konnect-api-auth']))
    - name: konnect_auth_namespace
      value: ($namespace)
    - name: gateway_image
      value: (env('GATEWAY_IMAGE') || 'kong/kong-gateway:3.12')
    - name: gateway_name
      value: (join('-', [($namespace), 'gateway']))
    - name: gateway_namespace
      value: ($namespace)
    - name: http_route_name
      value: (join('-', [($namespace), 'echo-route']))
    - name: http_route_namespace
      value: ($namespace)
    - name: echo_deployment_name
      value: (join('-', [($namespace), 'echo']))
    - name: echo_deployment_namespace
      value: ($namespace)
    - name: echo_deployment_replicas
      value: 3
    - name: http_method
      value: "GET"
    - name: client_cert_secret_name
      value: (join('-', [($namespace), 'client-cert-secret']))

  steps:
    # Step 1: Create TLS secret for Gateway TLS listener.
    - name: Create-tls-secret
      description: Create TLS Secret for the Gateway TLS listener.
      use:
        template: ../../common/_step_templates/apply-assert-tlsSecret.yaml

    # Step 2: Create secret for Konnect authentication.
    - name: Create-auth-secret
      description: Create Secret with Konnect token.
      use:
        template: ../../common/_step_templates/apply-assert-konnectAuthSecret.yaml

    # Step 3: Create KonnectAPIAuthConfiguration.
    - name: Create-konnect-api-auth
      description: Create KonnectAPIAuthConfiguration.
      use:
        template: ../../common/_step_templates/apply-assert-konnectAPIAuthConfiguration-secretref.yaml

    # Step 4: Create GatewayConfiguration.
    - name: Create-gateway-configuration
      description: Create GatewayConfiguration for hybrid gateway.
      use:
        template: ../../common/_step_templates/apply-assert-gatewayConfiguration.yaml

    # Step 5: Create GatewayClass.
    - name: Create-gateway-class
      description: Create GatewayClass.
      use:
        template: ../../common/_step_templates/apply-assert-gatewayClass.yaml

    # Step 6: Create Gateway with TLS listener.
    - name: Create-gateway
      description: Create Gateway.
      use:
        template: ../../common/_step_templates/apply-assert-gateway.yaml

    # Step 7: Assert KonnectGatewayControlPlane is created.
    - name: Assert-konnect-gateway-control-plane
      description: Assert KonnectGatewayControlPlane.
      use:
        template: ../../common/_step_templates/assert-konnectGatewayControlPlane.yaml

    # Step 8: Assert KongCertificate from TLS secret.
    - name: Assert-kong-certificate
      description: Assert KongCertificate.
      use:
        template: ../../common/_step_templates/assert-kongCertificate.yaml

    # Step 9: Assert KongSNI for SNI hostname.
    - name: Assert-kong-sni
      description: Assert KongSNI.
      use:
        template: ../../common/_step_templates/assert-kongSNI.yaml
      bindings:
        - name: resource_type
          value: "kongcertificates.configuration.konghq.com"

    # Step 10: Create echo service for traffic.
    - name: Create-echo-service
      description: Create echo service with multiple replicas for load balancing.
      use:
        template: ../../common/_step_templates/apply-assert-echoService.yaml
      bindings:
        - name: echo_deployment_replicas
          value: ($echo_deployment_replicas)

    # Step 11: Create Service with annotations.
    - name: Create-service-with-policy
      description: Create Service annotated with konghq.com/upstream-policy.
      try:
        - apply:
            file: 01-service.yaml
        - assert:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                namespace: ($namespace)
                name: echo-with-annotations
                annotations:
                  konghq.com/path: "/echo"
                  konghq.com/protocol: "https"
                  konghq.com/tls-verify: "true"
                  konghq.com/tls-verify-depth: "2"
                  konghq.com/connect-timeout: "5000"
                  konghq.com/read-timeout: "5000"
                  konghq.com/write-timeout: "5000"
                  konghq.com/retries: "3"
                  konghq.com/host-header: "fake.com"

    # Step 12: Create HTTPRoute to route traffic.
    - name: Create-httproute
      description: Create HTTPRoute referencing the annotated service.
      try:
        - apply:
            file: 02-httpRoute.yaml
        - assert:
            resource:
              apiVersion: gateway.networking.k8s.io/v1
              kind: HTTPRoute
              metadata:
                namespace: ($namespace)
                name: ($http_route_name)
              spec:
                parentRefs:
                  - name: ($gateway_name)

    # Step 13: Assert KongRoute is created.
    - name: Assert-kong-route
      description: Assert KongRoute.
      use:
        template: ../../common/_step_templates/assert-kongRoute.yaml
      bindings:
        - name: route_paths
          value:
            - "~/echo$"
            - "/echo/"
        - name: strip_path
          value: false
        - name: preserve_host
          value: true
        - name: resource_type
          value: "kongservices.configuration.konghq.com"

    # Step 14: Assert KongService is created.
    - name: Assert-kong-service
      description: Assert KongService.
      use:
        template: ../../common/_step_templates/assert-kongService.yaml

    # Step 14.1: Assert KongService has the correct specs.
    - name: Assert-kong-service-spec
      description: Assert KongService spec.
      try:
        - assert:
            resource:
              apiVersion: configuration.konghq.com/v1alpha1
              kind: KongService
              metadata:
                namespace: ($namespace)
              spec:
                path: "/echo"
                protocol: "https"
                tls_verify: true
                tls_verify_depth: 2
                connect_timeout: 5000
                read_timeout: 5000
                write_timeout: 5000
                retries: 3

    # Step 15: Assert KongUpstream is created.
    - name: Assert-kong-upstream
      description: Assert KongUpstream.
      use:
        template: ../../common/_step_templates/assert-kongUpstream.yaml

    # Step 15.1: Assert KongUpstream has the correct specs.
    - name: Assert-kong-upstream-spec
      description: Assert KongUpstream spec.
      try:
        - assert:
            resource:
              apiVersion: configuration.konghq.com/v1alpha1
              kind: KongUpstream
              metadata:
                namespace: ($namespace)
              spec:
                host_header: "fake.com"

    # Step 16: Create TLS Secret for
    - name: Create-tls-secret-for-client-cert-annotation
      description: Create TLS Secret for client-cert annotation.
      use:
        template: ../../common/_step_templates/apply-assert-tlsSecret.yaml
      bindings:
        - name: cert_secret_name
          value: ($client_cert_secret_name)

    # Step 17: Patch Service with client cert annotation.
    - name: Patch-service-with-client-cert-annotation
      description: Patch Service with client cert annotation.
      try:
        - patch:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                namespace: ($namespace)
                name: echo-with-annotations
                annotations:
                  konghq.com/client-cert: ($client_cert_secret_name)
        - assert:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                namespace: ($namespace)
                name: echo-with-annotations
                annotations:
                  konghq.com/client-cert: ($client_cert_secret_name)

    # Step 18: Assert KongService has the correct client cert reference.
    - name: Assert-kong-service-client-cert-ref`
      description: Assert KongService client cert reference.
      try:
        - script:
            env:
              - name: GATEWAY_NAME
                value: ($gateway_name)
              - name: GATEWAY_NAMESPACE
                value: ($gateway_namespace)
              - name: NAMESPACE
                value: ($gateway_namespace)
              - name: RESOURCE_TYPE
                value: kongservices.configuration.konghq.com
            content: |
              bash ../../common/scripts/kongResource_name.sh
            outputs:
              - name: kongservice_name
                value: (json_parse($stdout).name)
        - assert:
            resource:
              apiVersion: configuration.konghq.com/v1alpha1
              kind: KongService
              metadata:
                name: ($kongservice_name)
                namespace: ($namespace)
              spec:
                clientCertificateRef:
                  name: ($kongservice_name)
              status:
                (conditions[?type == 'KongCertificateRefValid']):
                  - status: 'True'
                    reason: Valid
        - assert:
            resource:
              apiVersion: configuration.konghq.com/v1alpha1
              kind: KongCertificate
              metadata:
                name: ($kongservice_name)
                namespace: ($namespace)
              spec:
                type: secretRef
                secretRef:
                  name: ($client_cert_secret_name)
                  namespace: ($namespace)
              status:
                # Multi-condition status check.
                (conditions[?type == 'Programmed']):
                  - status: 'True'
                    reason: Programmed
                (conditions[?type == 'ControlPlaneRefValid']):
                  - status: 'True'
                    reason: Valid
                (conditions[?type == 'APIAuthResolvedRef']):
                  - status: 'True'
                    reason: ResolvedRef
                (conditions[?type == 'APIAuthValid']):
                  - status: 'True'
                    reason: Valid

    # Step 19: Set a malformed konghq.com/tls-verify value on the backend Service.
    - name: Patch-service-malformed-annotation
      description: Patch backend Service with a malformed konghq.com/tls-verify value.
      try:
        - patch:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                namespace: ($namespace)
                name: echo-with-annotations
                annotations:
                  konghq.com/tls-verify: "maybe"
        - assert:
            resource:
              apiVersion: gateway.networking.k8s.io/v1
              kind: HTTPRoute
              metadata:
                namespace: ($namespace)
                name: ($http_route_name)
              status:
                parents:
                  - parentRef:
                      name: ($gateway_name)
                      namespace: ($gateway_namespace)
                    (conditions[?type == 'Accepted'] | [0]):
                      type: Accepted
                      status: "False"
                      reason: UnsupportedValue

    # Step 20: Fix the Service annotation back to a valid boolean.
    - name: Fix-service-malformed-annotation
      description: Patch the malformed konghq.com/tls-verify back to a valid boolean.
      try:
        - patch:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                namespace: ($namespace)
                name: echo-with-annotations
                annotations:
                  konghq.com/tls-verify: "true"
        - assert:
            resource:
              apiVersion: gateway.networking.k8s.io/v1
              kind: HTTPRoute
              metadata:
                namespace: ($namespace)
                name: ($http_route_name)
              status:
                parents:
                  - parentRef:
                      name: ($gateway_name)
                      namespace: ($gateway_namespace)
                    (conditions[?type == 'Accepted'] | [0]):
                      type: Accepted
                      status: "True"

    # Step 21: Set a malformed konghq.com/tls-verify-depth value on the backend Service.
    - name: Patch-service-malformed-int-annotation
      description: Patch backend Service with a malformed konghq.com/tls-verify-depth value.
      try:
        - patch:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                namespace: ($namespace)
                name: echo-with-annotations
                annotations:
                  konghq.com/tls-verify-depth: "not-an-int"
        - assert:
            resource:
              apiVersion: gateway.networking.k8s.io/v1
              kind: HTTPRoute
              metadata:
                namespace: ($namespace)
                name: ($http_route_name)
              status:
                parents:
                  - parentRef:
                      name: ($gateway_name)
                      namespace: ($gateway_namespace)
                    (conditions[?type == 'Accepted'] | [0]):
                      type: Accepted
                      status: "False"
                      reason: UnsupportedValue

    # Step 22: Fix the Service annotation back to a valid non-negative integer.
    - name: Fix-service-malformed-int-annotation
      description: Patch the malformed konghq.com/tls-verify-depth back to a valid integer.
      try:
        - patch:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                namespace: ($namespace)
                name: echo-with-annotations
                annotations:
                  konghq.com/tls-verify-depth: "2"
        - assert:
            resource:
              apiVersion: gateway.networking.k8s.io/v1
              kind: HTTPRoute
              metadata:
                namespace: ($namespace)
                name: ($http_route_name)
              status:
                parents:
                  - parentRef:
                      name: ($gateway_name)
                      namespace: ($gateway_namespace)
                    (conditions[?type == 'Accepted'] | [0]):
                      type: Accepted
                      status: "True"

  catch:
    # Capture debug snapshot on test failure.
    - description: Capture debug snapshot
      script:
        env:
          - name: TEST_NAME
            value: hybridgateway-httproute-upstream-policy
          - name: NAMESPACE
            value: ($namespace)
          - name: OPERATOR_NAMESPACE
            value: kong-system
        content: |
          bash ../../common/scripts/debug_snapshot.sh
