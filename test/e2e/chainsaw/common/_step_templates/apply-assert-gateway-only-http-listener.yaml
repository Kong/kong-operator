# Template for creating and asserting a Gateway with only HTTP listener.
#
# Required bindings:
#   - gateway_name: The name of the Gateway.
#   - gateway_class_name: The name of the GatewayClass which the Gateway belongs to.
#   - namespace: Namespace where the gateway will be created.
#   - listener_http_port: HTTP listener port (e.g., 80).
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: StepTemplate
metadata:
  name: apply-assert-gateway
spec:
  try:
    - apply:
        resource:
          apiVersion: gateway.networking.k8s.io/v1
          kind: Gateway
          metadata:
            name: ($gateway_name)
            namespace: ($namespace)
          spec:
            gatewayClassName: ($gateway_class_name)
            listeners:
            - name: http
              protocol: HTTP
              port: ($listener_http_port)
    - assert:
        resource:
          apiVersion: gateway.networking.k8s.io/v1
          kind: Gateway
          metadata:
            name: ($gateway_name)
            namespace: ($namespace)
          status:
            # Using your dynamic condition filtering for high resilience
            (conditions[?type == 'Accepted']):
              - status: 'True'
                reason: Accepted
            (conditions[?type == 'Programmed']):
              - status: 'True'
                reason: Programmed
            (conditions[?type == 'DataPlaneReady']):
              - status: 'True'
                reason: Ready
            (conditions[?type == 'KonnectGatewayControlPlaneProgrammed']):
              - status: 'True'
                reason: Programmed
            (conditions[?type == 'KonnectExtensionReady']):
              - status: 'True'
                reason: Ready
            (conditions[?type == 'GatewayService']):
              - status: 'True'
                reason: Ready
