kind: KonnectAPIAuthConfiguration
apiVersion: konnect.konghq.com/v1alpha1
metadata:
  name: konnect-api-auth-1
  namespace: default
spec:
  type: token
  token: kpat_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  # For a complete list of available API URLs see: https://docs.konghq.com/konnect/network/#kong-gateway-hostnames
  serverURL: us.api.konghq.tech
---
kind: KonnectAIGateway
apiVersion: konnect.konghq.com/v1alpha1
metadata:
  name: ai-gw-cp-1
  namespace: default
spec:
  apiSpec:
    name: ai-gw-cp-1
    displayName: My AI Gateway
    description: AI Gateway control plane
  konnect:
    authRef:
      name: konnect-api-auth-1
---
kind: AIGatewayAgent
apiVersion: konnect.konghq.com/v1alpha1
metadata:
  name: my-ai-agent
  namespace: default
spec:
  aiGatewayRef:
    type: namespacedRef
    namespacedRef:
      name: ai-gw-cp-1
  apiSpec:
    name: my-ai-agent
    displayName: My AI Agent
    type: http
    enabled: Enabled
    # References to AIGatewayPolicy CRs (by metadata.name) applied to this agent.
    # See config/samples/konnect_aigatewaypolicy.yaml for the referenced policy.
    policies:
      - name: aigw-policy-prompt-decorator
    # Access control: allow-list of AIGatewayConsumer / AIGatewayConsumerGroup
    # CRs (referenced by metadata.name). The operator resolves each reference to
    # the referenced CR's Konnect name at reconcile time. See
    # config/samples/konnect_aigatewayconsumer.yaml and
    # config/samples/konnect_aigatewayconsumergroup.yaml.
    access:
      acls:
        type: allow
        allow:
          allow:
            - kind: AIGatewayConsumer
              name: ai-gw-consumer-1
            - kind: AIGatewayConsumerGroup
              name: ai-gw-consumer-group-1
    config:
      url: https://my-upstream-agent.example.com
      route:
        paths:
          - /my-ai-agent
        methods:
          - GET
          - POST
        protocols:
          - http
          - https
