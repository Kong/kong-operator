---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ($gateway_name)
  namespace: ($gateway_namespace)
status:
  (conditions[?type == 'Accepted']):
    - status: 'True'
      reason: Accepted
  (conditions[?type == 'Programmed']):
    - status: 'True'
      reason: Programmed
  (conditions[?type == 'DataPlaneReady']):
    - status: 'True'
      reason: Ready
  (listeners[?name == 'udp']):
    - attachedRoutes: 1
      (conditions[?type == 'Accepted']):
        - status: 'True'
          reason: Accepted
      (conditions[?type == 'ResolvedRefs']):
        - status: 'True'
          reason: ResolvedRefs
      (conditions[?type == 'Programmed']):
        - status: 'True'
          reason: Programmed
      (supportedKinds[?kind == 'UDPRoute']):
        - group: gateway.networking.k8s.io
          kind: UDPRoute
  (listeners[?name == 'udp-extra']):
    - attachedRoutes: 1
      (conditions[?type == 'Accepted']):
        - status: 'True'
          reason: Accepted
      (conditions[?type == 'ResolvedRefs']):
        - status: 'True'
          reason: ResolvedRefs
      (conditions[?type == 'Programmed']):
        - status: 'True'
          reason: Programmed
      (supportedKinds[?kind == 'UDPRoute']):
        - group: gateway.networking.k8s.io
          kind: UDPRoute
---
apiVersion: gateway.networking.k8s.io/v1
kind: UDPRoute
metadata:
  name: ($udp_route_second_name)
  namespace: ($gateway_namespace)
status:
  parents:
    - parentRef:
        name: ($gateway_name)
        group: gateway.networking.k8s.io
        kind: Gateway
        sectionName: udp
      controllerName: konghq.com/gateway-operator
      (conditions[?type == 'Accepted']):
        - status: 'True'
          reason: Accepted
      (conditions[?type == 'Programmed']):
        - status: 'True'
          reason: ConfiguredInGateway
      (conditions[?type == 'ResolvedRefs']):
        - status: 'True'
          reason: ResolvedRefs
---
apiVersion: gateway.networking.k8s.io/v1
kind: UDPRoute
metadata:
  name: ($udp_route_third_name)
  namespace: ($gateway_namespace)
status:
  parents:
    - parentRef:
        name: ($gateway_name)
        group: gateway.networking.k8s.io
        kind: Gateway
        sectionName: udp-extra
      controllerName: konghq.com/gateway-operator
      (conditions[?type == 'Accepted']):
        - status: 'True'
          reason: Accepted
      (conditions[?type == 'Programmed']):
        - status: 'True'
          reason: ConfiguredInGateway
      (conditions[?type == 'ResolvedRefs']):
        - status: 'True'
          reason: ResolvedRefs
