kind: EventGatewayListenerPolicy
apiVersion: configuration.konghq.com/v1alpha1
metadata:
  name: cp-event-1-listener-1
  namespace: default
spec:
  apiSpec:
    type: tlsServer
    tlsServer:
      name: cp-event-1-listener-1-policy-1
      description: Test Event Gateway Listener Policy from Kong Operator
      enabled: Enabled
      labels:
        app: test1
        env: test
      config:
        allowPlaintext: Enabled
        versions:
          min: TLSv1.2
          max: TLSv1.3
        certificates:
          - certificate:
              type: secretRef
              secretRef:
                name: cp-event-1-listener-1-tls
                key: tls.crt
            key:
              type: secretRef
              secretRef:
                name: cp-event-1-listener-1-tls
                key: tls.key
  eventGatewayListenerRef:
    type: namespacedRef
    namespacedRef:
      name: cp-event-1-listener-1
