# Template for verifying that an HTTPS request to a DataPlane returns a status code
# matching an expected regex (e.g. '^200$' for success, '^5..$' for upstream failure).
#
# Required bindings:
#   - dataplane_name: Name of the DataPlane.
#   - dataplane_namespace: Namespace of the DataPlane.
#   - route_path: HTTP path to test (e.g. "/echo").
#   - expected_status_regex: Bash-compatible regex matched against the HTTP status code.
#   - proxy_port: (optional) Port to connect to. Default: 443.
#   - host_header: (optional) Host header to send with the request.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: StepTemplate
metadata:
  name: verify-https-status-code
spec:
  try:
    # 1. Dynamically discover the DataPlane's proxy IP.
    - script:
        env:
          - name: RESOURCE_TYPE
            value: dataplane
          - name: RESOURCE_NAME
            value: ($dataplane_name)
          - name: RESOURCE_NAMESPACE
            value: ($dataplane_namespace)
        content: |
          bash ../../common/scripts/proxy_ip_address.sh
        outputs:
          - name: proxy_ip
            value: (json_parse($stdout).proxy_ip_address)
        check:
          (json_parse($stdout).proxy_ip_address != null): true
          (json_parse($stdout).proxy_ip_address != ''): true

    # 2. Perform the HTTPS status-code check.
    - script:
        env:
          - name: PROXY_IP
            value: ($proxy_ip)
          - name: PROXY_PORT
            value: ($proxy_port)
          - name: ROUTE_PATH
            value: ($route_path)
          - name: EXPECTED_STATUS_REGEX
            value: ($expected_status_regex)
          - name: HOST
            value: ($host_header)
        content: |
          bash ../../common/scripts/host_connectivity_test_https_status.sh
        check:
          (to_string(json_parse($stdout).success) == 'true'): true
