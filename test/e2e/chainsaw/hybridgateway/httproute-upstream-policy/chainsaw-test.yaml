# Test: HTTPRoute with konghq.com/upstream-policy annotation.
# Verifies that the hybrid gateway controller applies KongUpstreamPolicy
# to KongUpstream when a backend Service is annotated with konghq.com/upstream-policy.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: httproute-upstream-policy
spec:
  description: |
    This test validates that the hybrid gateway controller correctly processes
    the konghq.com/upstream-policy annotation on Services referenced by HTTPRoute.
    When a Service is annotated with konghq.com/upstream-policy: <name>,
    the referenced KongUpstreamPolicy should be applied to the generated KongUpstream.

  bindings:
    # Common bindings (reused from basic-httproute pattern).
    - name: test_name
      value: ($namespace)
    - name: konnect_token
      value: (env('KONNECT_TOKEN'))
    - name: konnect_api_auth_namespace
      value: ($namespace)
    - name: sni_hostname
      value: (join('.', ['*', ($namespace), 'example.com']))
    - name: fqdn
      value: (join('.', ['echo', ($namespace), 'example.com']))
    - name: cert_secret_name
      value: test-tls-secret
    - name: cert_secret_namespace
      value: ($namespace)
    - name: listener_https_port
      value: 443
    - name: listener_http_port
      value: 80
    - name: konnect_url
      value: (env('KONNECT_SERVER_URL') || 'eu.api.konghq.tech')
    - name: auth_secret_name
      value: (join('-', [($namespace), 'konnect-auth-secret']))
    - name: auth_secret_namespace
      value: ($namespace)
    - name: konnect_auth_name
      value: (join('-', [($namespace), 'konnect-api-auth']))
    - name: konnect_auth_namespace
      value: ($namespace)
    - name: gateway_image
      value: (env('GATEWAY_IMAGE') || 'kong/kong-gateway:3.14')
    - name: gateway_name
      value: (join('-', [($namespace), 'gateway']))
    - name: gateway_namespace
      value: ($namespace)
    - name: http_route_name
      value: (join('-', [($namespace), 'echo-route']))
    - name: http_route_namespace
      value: ($namespace)
    - name: echo_deployment_name
      value: (join('-', [($namespace), 'echo']))
    - name: echo_deployment_namespace
      value: ($namespace)
    - name: echo_deployment_replicas
      value: 3
    - name: http_method
      value: "GET"

  steps:
    # Step 1: Create TLS secret for Gateway TLS listener.
    - name: Create-tls-secret
      description: Create TLS Secret for the Gateway TLS listener.
      use:
        template: ../../common/_step_templates/apply-assert-tlsSecret.yaml

    # Step 2: Create secret for Konnect authentication.
    - name: Create-auth-secret
      description: Create Secret with Konnect token.
      use:
        template: ../../common/_step_templates/apply-assert-konnectAuthSecret.yaml

    # Step 3: Create KonnectAPIAuthConfiguration.
    - name: Create-konnect-api-auth
      description: Create KonnectAPIAuthConfiguration.
      use:
        template: ../../common/_step_templates/apply-assert-konnectAPIAuthConfiguration-secretref.yaml

    # Step 4: Create GatewayConfiguration.
    - name: Create-gateway-configuration
      description: Create GatewayConfiguration for hybrid gateway.
      use:
        template: ../../common/_step_templates/apply-assert-gatewayConfiguration.yaml

    # Step 5: Create GatewayClass.
    - name: Create-gateway-class
      description: Create GatewayClass.
      use:
        template: ../../common/_step_templates/apply-assert-gatewayClass.yaml

    # Step 6: Create Gateway with TLS listener.
    - name: Create-gateway
      description: Create Gateway.
      use:
        template: ../../common/_step_templates/apply-assert-gateway.yaml

    # Step 7: Assert KonnectGatewayControlPlane is created.
    - name: Assert-konnect-gateway-control-plane
      description: Assert KonnectGatewayControlPlane.
      use:
        template: ../../common/_step_templates/assert-konnectGatewayControlPlane.yaml

    # Step 8: Assert KongCertificate from TLS secret.
    - name: Assert-kong-certificate
      description: Assert KongCertificate.
      use:
        template: ../../common/_step_templates/assert-kongCertificate.yaml

    # Step 9: Assert KongSNI for SNI hostname.
    - name: Assert-kong-sni
      description: Assert KongSNI.
      use:
        template: ../../common/_step_templates/assert-kongSNI.yaml
      bindings:
        - name: resource_type
          value: "kongcertificates.configuration.konghq.com"

    # Step 10: Create echo service for traffic.
    - name: Create-echo-service
      description: Create echo service with multiple replicas for load balancing.
      use:
        template: ../../common/_step_templates/apply-assert-echoService.yaml
      bindings:
        - name: echo_deployment_replicas
          value: ($echo_deployment_replicas)

    # Step 11: Create KongUpstreamPolicy.
    - name: Create-kong-upstream-policy
      description: Create KongUpstreamPolicy with consistent-hashing, hashOn, and healthchecks.
      try:
        - apply:
            file: 01-kong-upstream-policy.yaml
        - assert:
            resource:
              apiVersion: configuration.konghq.com/v1beta1
              kind: KongUpstreamPolicy
              metadata:
                namespace: ($namespace)
                name: test-upstream-policy
              spec:
                algorithm: consistent-hashing
                slots: 100
                hashOn:
                  input: ip
                healthchecks:
                  active:
                    type: tcp
                    concurrency: 20
                    healthy:
                      interval: 5
                      successes: 5
                    unhealthy:
                      timeouts: 5
                      interval: 10
                  passive:
                    type: http
                    healthy:
                      successes: 5
                    unhealthy:
                      timeouts: 10

    # Step 12: Create Service with upstream-policy annotation.
    - name: Create-service-with-policy
      description: Create Service annotated with konghq.com/upstream-policy.
      try:
        - apply:
            file: 02-service.yaml
        - assert:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                namespace: ($namespace)
                name: echo-with-policy
                annotations:
                  konghq.com/upstream-policy: test-upstream-policy

    # Step 13: Create HTTPRoute to route traffic.
    - name: Create-httproute
      description: Create HTTPRoute referencing the annotated service.
      try:
        - apply:
            file: 03-httpRoute.yaml
        - assert:
            resource:
              apiVersion: gateway.networking.k8s.io/v1
              kind: HTTPRoute
              metadata:
                namespace: ($namespace)
                name: ($http_route_name)
              spec:
                parentRefs:
                  - name: ($gateway_name)

    # Step 14: Assert KongRoute is created.
    - name: Assert-kong-route
      description: Assert KongRoute.
      use:
        template: ../../common/_step_templates/assert-kongRoute.yaml
      bindings:
        - name: route_paths
          value:
            - "~/echo$"
            - "/echo/"
        - name: strip_path
          value: false
        - name: preserve_host
          value: true
        - name: resource_type
          value: "kongservices.configuration.konghq.com"

    # Step 15: Assert KongService is created.
    - name: Assert-kong-service
      description: Assert KongService.
      use:
        template: ../../common/_step_templates/assert-kongService.yaml

    # Step 16: Assert KongUpstream is created.
    - name: Assert-kong-upstream
      description: Assert KongUpstream.
      use:
        template: ../../common/_step_templates/assert-kongUpstream.yaml

    # Step 16.1: Assert KongUpstream has the correct specs.
    - name: Assert-kong-upstream-spec
      description: Assert KongUpstream spec.
      try:
        - assert:
            resource:
              apiVersion: configuration.konghq.com/v1alpha1
              kind: KongUpstream
              metadata:
                namespace: ($namespace)
              spec:
                  algorithm: consistent-hashing
                  slots: 100
                  hash_on: ip
                  healthchecks:
                    active:
                      type: tcp
                      concurrency: 20
                      healthy:
                        interval: 5
                        successes: 5
                      unhealthy:
                        timeouts: 5
                        interval: 10
                    passive:
                      type: http
                      healthy:
                        successes: 5
                      unhealthy:
                        timeouts: 10

    # Step 17: Verify KongUpstream has policy fields (algorithm, slots, hashOn, healthchecks).
    - name: Verify-upstream-policy-applied
      description: Verify KongUpstream spec has consistent-hashing, slots=100, hashOn=ip, healthchecks.
      try:
        - script:
            env:
              - name: NAMESPACE
                value: ($namespace)
              - name: GATEWAY_NAME
                value: ($gateway_name)
              - name: GATEWAY_NAMESPACE
                value: ($gateway_namespace)
              - name: HTTP_ROUTE_NAME
                value: ($http_route_name)
              - name: HTTP_ROUTE_NAMESPACE
                value: ($http_route_namespace)
              - name: EXPECTED_ALGORITHM
                value: "consistent-hashing"
              - name: EXPECTED_SLOTS
                value: "100"
              - name: EXPECTED_HASHON_INPUT
                value: "ip"
              - name: EXPECTED_HC_ACTIVE_TYPE
                value: "tcp"
              - name: EXPECTED_HC_ACTIVE_CONCURRENCY
                value: "20"
              - name: EXPECTED_HC_ACTIVE_HEALTHY_INTERVAL
                value: "5"
              - name: EXPECTED_HC_ACTIVE_UNHEALTHY_TIMEOUTS
                value: "5"
              - name: EXPECTED_HC_ACTIVE_UNHEALTHY_INTERVAL
                value: "10"
              - name: EXPECTED_HC_PASSIVE_TYPE
                value: "http"
              - name: EXPECTED_HC_PASSIVE_HEALTHY_SUCCESSES
                value: "5"
              - name: EXPECTED_HC_PASSIVE_UNHEALTHY_TIMEOUTS
                value: "10"
            content: |
              bash ../../common/scripts/verify_kong_upstream_policy.sh

    # Step 18: Verify HTTPS traffic works with policy applied.
    - name: Verify-HTTPS-traffic-from-host
      description: Verify HTTPS traffic with upstream policy.
      use:
        template: ../../common/_step_templates/verify-https-traffic-from-host.yaml
      bindings:
        - name: route_path
          value: "/echo"
        - name: insecure
          value: "true"

    # Step 19: Verify HTTP traffic works with policy applied.
    - name: Verify-HTTP-traffic-from-host
      description: Verify HTTP traffic with upstream policy.
      use:
        template: ../../common/_step_templates/verify-http-traffic-from-host.yaml
      bindings:
        - name: route_path
          value: "/echo"
        - name: listener_http_port
          value: "80"
        - name: host_header
          value: ($fqdn)

    # Step 19: Verify HTTP traffic works with policy applied.
    - name: Verify-HTTP-traffic-from-host-to-same-upstream
      description: Verify HTTP traffic with upstream policy.
      use:
        template: ../../common/_step_templates/verify-http-traffic-from-host-to-same-upstream.yaml
      bindings:
        - name: route_path
          value: "/echo"
        - name: listener_http_port
          value: "80"
        - name: host_header
          value: ($fqdn)

  catch:
    # Capture debug snapshot on test failure.
    - description: Capture debug snapshot
      script:
        env:
          - name: TEST_NAME
            value: hybridgateway-httproute-upstream-policy
          - name: NAMESPACE
            value: ($namespace)
          - name: OPERATOR_NAMESPACE
            value: kong-system
        content: |
          bash ../../common/scripts/debug_snapshot.sh
