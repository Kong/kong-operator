apiVersion: v1
kind: Namespace
metadata:
  name: konnect
---
apiVersion: v1
kind: Namespace
metadata:
  name: event-gateways
---
apiVersion: v1
kind: Namespace
metadata:
  name: event-virtual-clusters
---
apiVersion: v1
kind: Namespace
metadata:
  name: event-policies
---
kind: KonnectAPIAuthConfiguration
apiVersion: konnect.konghq.com/v1alpha1
metadata:
  name: konnect-api-auth
  namespace: konnect
spec:
  type: token
  token: kpat_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  # For a complete list of available API URLs see:
  # https://docs.konghq.com/konnect/network/#kong-gateway-hostnames
  serverURL: eu.api.konghq.com
---
# Allow the Event Gateway in event-gateways to use the Konnect auth
# configuration in konnect.
apiVersion: configuration.konghq.com/v1alpha1
kind: KongReferenceGrant
metadata:
  name: allow-eventgateway-to-konnect-auth
  namespace: konnect
spec:
  from:
    - group: konnect.konghq.com
      kind: KonnectEventGateway
      namespace: event-gateways
  to:
    - group: konnect.konghq.com
      kind: KonnectAPIAuthConfiguration
---
# Allow the VirtualCluster in event-virtual-clusters to reference the
# BackendCluster in event-gateways.
apiVersion: configuration.konghq.com/v1alpha1
kind: KongReferenceGrant
metadata:
  name: allow-virtualcluster-to-backendcluster
  namespace: event-gateways
spec:
  from:
    - group: konnect.konghq.com
      kind: EventGatewayVirtualCluster
      namespace: event-virtual-clusters
  to:
    - group: konnect.konghq.com
      kind: EventGatewayBackendCluster
---
# Allow the ConsumePolicy in event-policies to reference the VirtualCluster in
# event-virtual-clusters.
apiVersion: configuration.konghq.com/v1alpha1
kind: KongReferenceGrant
metadata:
  name: allow-consumepolicy-to-virtualcluster
  namespace: event-virtual-clusters
spec:
  from:
    - group: konnect.konghq.com
      kind: EventGatewayVirtualClusterConsumePolicy
      namespace: event-policies
  to:
    - group: konnect.konghq.com
      kind: EventGatewayVirtualCluster
---
kind: KonnectEventGateway
apiVersion: konnect.konghq.com/v1alpha1
metadata:
  name: shared-event-gateway
  namespace: event-gateways
spec:
  apiSpec:
    name: shared-event-gateway
    description: Event Gateway shared across namespaces
    labels:
      app: sample
      env: demo
  konnect:
    authRef:
      name: konnect-api-auth
      namespace: konnect
---
