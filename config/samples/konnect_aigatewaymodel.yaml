kind: KonnectAIGateway
apiVersion: konnect.konghq.com/v1alpha1
metadata:
  name: ai-gw-cp-1
  namespace: default
spec:
  apiSpec:
    name: ai-gw-cp-1
    displayName: My AI Gateway
    description: AI Gateway control plane
    labels:
      app: test1
  konnect:
    authRef:
      name: konnect-api-auth-1
---
kind: AIGatewayConsumerGroup
apiVersion: konnect.konghq.com/v1alpha1
metadata:
  name: ai-gw-model-consumer-group
  namespace: default
spec:
  aiGatewayRef:
    type: namespacedRef
    namespacedRef:
      name: ai-gw-cp-1
  apiSpec:
    name: model-dev-users
    displayName: Dev Users Group
---
apiVersion: v1
kind: Secret
metadata:
  name: openai-credentials
  namespace: default
  labels:
    konghq.com/secret: "true"
type: Opaque
data:
  token: QmVhcmVyIHNrLXh4eHh4eHh4eHh4eHh4eHh4eHh4
---
kind: AIGatewayModelProvider
apiVersion: konnect.konghq.com/v1alpha1
metadata:
  name: ai-gw-provider-openai
  namespace: default
spec:
  aiGatewayRef:
    type: namespacedRef
    namespacedRef:
      name: ai-gw-cp-1
  apiSpec:
    type: openai
    openai:
      name: openai-provider
      displayName: OpenAI
      config:
        auth:
          headers:
            - name: Authorization
              # Credential referenced from a Kubernetes Secret. The Secret must
              # exist in the same namespace as this AIGatewayModelProvider (or set
              # secretRef.namespace) and contain the key below.
              value:
                type: secretRef
                secretRef:
                  name: openai-credentials
                  key: token
---
kind: AIGatewayPolicy
apiVersion: konnect.konghq.com/v1alpha1
metadata:
  name: ai-gw-policy-prompt-decorator
  namespace: default
spec:
  aiGatewayRef:
    type: namespacedRef
    namespacedRef:
      name: ai-gw-cp-1
  apiSpec:
    displayName: "AIGateway Policy Prompt Decorator"
    # Name of the policy. The name must be unique within the control plane.
    name: aigw-policy-prompt-decorator
    # Type of the policy.
    type: ai-sanitizer
    enabled: "Enabled"
    # Set to "Enabled" to enable the policy globally.
    global: "Disabled"
    # Configuration for the policy. The configuration is specific to the policy type.
    config:
      type: "inline"
      value:
        anonymize:
        - email
        - phone
        - ssn
        - creditcard
        - custom
        custom_patterns:
        - name: github_token
          regex: ghp_[A-Za-z0-9]{36}
          score: 0.9
---
kind: AIGatewayModel
apiVersion: konnect.konghq.com/v1alpha1
metadata:
  name: sample-ai-gw-model-api
  namespace: default
spec:
  aiGatewayRef:
    type: namespacedRef
    namespacedRef:
      name: ai-gw-cp-1
  apiSpec:
    type: api
    api:
      name: gpt-4o-mini
      displayName: GPT-4o Mini
      enabled: Enabled
      formats:
        - type: openai
      capabilities:
        - files
      # Access control: allow-list of AIGatewayConsumerGroup
      # CRs (referenced by metadata.name), resolved to the referenced CR's
      # Konnect name at reconcile time.
      access:
        acls:
          type: allow
          allow:
            allow:
              - kind: AIGatewayConsumerGroup
                name: ai-gw-model-consumer-group
      config:
        route:
          paths:
            - /v1/chat/completions
          # Routes a request to this model when its path matches one of the
          # aliases below (in addition to the paths/methods/hosts match above).
          model:
            type: pathAliases
            pathAliases:
              - gpt-4o-mini
      # References to AIGatewayPolicy CRs (by metadata.name). The operator
      # resolves each reference to the referenced CR's Konnect name at
      # reconcile time.
      policies:
       - name: ai-gw-policy-prompt-decorator
      labels:
        app: test1
        env: test
      targets:
        - name: gpt-4o-mini
          provider:
            name: ai-gw-provider-openai
          config:
            type: openai
            openai:
              upstreamURL: https://api.openai.com/v1/chat/completions
---
kind: AIGatewayModel
apiVersion: konnect.konghq.com/v1alpha1
metadata:
  name: sample-ai-gw-model
  namespace: default
spec:
  aiGatewayRef:
    type: namespacedRef
    namespacedRef:
      name: ai-gw-cp-1
  apiSpec:
    type: model
    model:
      name: gpt-4o-mini-model
      displayName: GPT-4o Mini
      enabled: Enabled
      formats:
        - type: openai
      capabilities:
        - agentic
        - generate
      config:
        responseStreaming: always
        route:
          model:
            type: headers
            # route.model.headers is an object keyed by header name (Kong
            # route header-matching format: { "<header>": [<values>] }), not
            # a list. Routes a request to this model when headers match:
            headers:
              X-Kong-LLM-Model:
                - gpt-4o-mini-model
          tags:
            - customtag
          paths:
            - /v1/chat/completions
      labels:
        app: test1
        env: test
      targets:
        - name: gpt-4o-mini-model
          provider:
            name: ai-gw-provider-openai
          config:
            type: openai
            openai:
              upstreamURL: https://api.openai.com/v1/chat/completions
