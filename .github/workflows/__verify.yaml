name: verify

on:
  workflow_call: {}

permissions:
  contents: read
  issues: read
  pull-requests: read

env:
  MISE_VERBOSE: 1
  MISE_DEBUG: 1

jobs:
  verify:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(vars.GHA_EXTENDED_TIMEOUT_MINUTES || 20) }}
    env:
      CRD_BREAKING_CHANGES_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || github.event.before || '' }}
      ACK_CRD_BREAKING_CHANGE_LABEL: ack_crd_breaking_change
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: go-fix
            make-target: verify.go-fix
            fetch_depth: 1
            lint-cache: false
          - name: manifests
            make-target: verify.manifests
            fetch_depth: 1
            lint-cache: false
          - name: generators
            make-target: verify.generators
            fetch_depth: 1
            lint-cache: true
          - name: crd-breaking-changes
            make-target: verify.crd-breaking-changes
            fetch_depth: 0
            lint-cache: false
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
      with:
        egress-policy: audit
    - name: Checkout repository
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        fetch-depth: ${{ matrix.fetch_depth }}

    - name: Setup go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        go-version-file: go.mod
        cache: false

    - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      with:
        install: false

    - run: |
        {
          echo "GO_MOD_CACHE=$(go env GOMODCACHE)"
          echo "GO_BUILD_CACHE=$(go env GOCACHE)"
        } >> $GITHUB_ENV

    # Restore-only, reusing the shared `go-build-*` cache written by the `build` job in
    # tests.yaml. We never save here to avoid creating additional caches.
    - name: Restore go build cache
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v4
      with:
        path: |
          ${{ env.GO_MOD_CACHE }}
          ${{ env.GO_BUILD_CACHE }}
        key: go-build-${{ runner.os }}-${{ runner.arch }}-go-${{ hashFiles('**/go.mod') }}
        restore-keys: |
          go-build-${{ runner.os }}-${{ runner.arch }}-go-

    # Only the `generators` target runs golangci-lint (via generate -> generate.lint-fix).
    # Restore-only, reusing the shared `go-lint-*` cache written by the lint job in
    # __lint.yaml. Key/paths must match __lint.yaml exactly for the restore to hit.
    - if: ${{ matrix.lint-cache }}
      run: echo "GOLANGCI_LINT_CACHE=$(make golangci-lint-cache-path | tail -1)" >> $GITHUB_ENV

    - name: Restore lint cache
      if: ${{ matrix.lint-cache }}
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v4
      with:
        path: |
          ${{ env.GO_MOD_CACHE }}
          ${{ env.GO_BUILD_CACHE }}
          ${{ env.GOLANGCI_LINT_CACHE }}
        key: go-lint-${{ runner.os }}-${{ runner.arch }}-go-${{ hashFiles('**/go.mod') }}
        restore-keys: |
          go-lint-${{ runner.os }}-${{ runner.arch }}-go-

    - name: Check CRD breaking-change acknowledgement
      if: ${{ matrix.name == 'crd-breaking-changes' }}
      env:
        GH_TOKEN: ${{ github.token }}
        PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number || '' }}
        MERGE_GROUP_HEAD_REF: ${{ github.event.merge_group.head_ref || '' }}
      run: |
        set -euo pipefail

        ack="false"
        # pull_request has one PR number. merge_group can represent one or more queued PRs,
        # so keep this as a whitespace-separated list and acknowledge if any PR has the label.
        pr_numbers="${PULL_REQUEST_NUMBER}"

        if [[ "${GITHUB_EVENT_NAME}" == "merge_group" ]]; then
          # The merge-group SHA is synthetic, so resolve the queued PRs from that commit.
          # Fall back to the generated head_ref format because the commit-to-PR API can
          # return nothing for merge queue commits.
          pr_numbers="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
            --jq '.[].number' || true)"

          if [[ -z "${pr_numbers}" && "${MERGE_GROUP_HEAD_REF}" =~ (^|/)pr-([0-9]+)- ]]; then
            pr_numbers="${BASH_REMATCH[2]}"
          fi

          if [[ -z "${pr_numbers}" ]]; then
            echo "Could not determine pull requests for merge group; CRD breaking changes will not be acknowledged automatically."
          fi
        fi

        for pr_number in ${pr_numbers}; do
          has_ack_label="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/issues/${pr_number}/labels" \
            --jq 'any(.[].name; . == env.ACK_CRD_BREAKING_CHANGE_LABEL)')"

          if [[ "${has_ack_label}" == "true" ]]; then
            ack="true"
            break
          fi
        done

        echo "ACK_CRD_BREAKING_CHANGE=${ack}" >> "${GITHUB_ENV}"

    - run: make ${{ matrix.make-target }}
