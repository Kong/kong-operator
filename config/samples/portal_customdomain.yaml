kind: Portal
apiVersion: konnect.konghq.com/v1alpha1
metadata:
  name: portal1
  namespace: default
spec:
  konnect:
    authRef:
      name: konnect-api-auth
  apiSpec:
    name: portal1
    authenticationEnabled: Enabled
---
kind: PortalCustomDomain
apiVersion: konnect.konghq.com/v1alpha1
metadata:
  name: portal1-custom-domain
  namespace: default
spec:
  portalRef:
    type: namespacedRef
    namespacedRef:
      name: portal1
  apiSpec:
    enabled: Enabled
    hostname: portal1.customdomain.com
    ssl:
      type: standard
      standard:
        domainVerificationMethod: http
