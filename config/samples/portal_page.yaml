kind: Portal
apiVersion: konnect.konghq.com/v1alpha1
metadata:
  name: portal1
  namespace: default
spec:
  konnect:
    authRef:
      name: konnect-api-auth
  apiSpec:
    name: portal1
    authenticationEnabled: Enabled
---
kind: PortalPage
apiVersion: konnect.konghq.com/v1alpha1
metadata:
  name: portal1
  namespace: default
spec:
  portalRef:
    type: namespacedRef
    namespacedRef:
      name: portal1
  apiSpec:
    title: Getting Started
    slug: getting-started
    description: Getting started guide for the developer portal
    content: |
      # Getting Started

      Welcome to the developer portal. This guide walks you through authenticating and making your first API call.

      ## Authentication

      All requests require a valid API key in the `Authorization` header.

      ## Quick Start

      ```bash
      curl -H "Authorization: Bearer <your-api-key>" https://api.example.com/v1/hello
      ```
    status: published
    visibility: public
