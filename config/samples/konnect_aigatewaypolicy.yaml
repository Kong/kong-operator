kind: KonnectAPIAuthConfiguration
apiVersion: konnect.konghq.com/v1alpha1
metadata:
  name: konnect-api-auth-1
  namespace: default
spec:
  type: token
  token: kpat_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  # For a complete list of available API URLs see:https://docs.konghq.com/konnect/network/#kong-gateway-hostnames
  serverURL: us.api.konghq.tech
---
kind: KonnectAIGateway
apiVersion: konnect.konghq.com/v1alpha1
metadata:
  name: ai-gw-cp-1
  namespace: default
spec:
  apiSpec:
    name: ai-gw-cp-1
    displayName: My AI Gateway
    description: AI Gateway control plane
    labels:
      app: test1
  konnect:
    authRef:
      name: konnect-api-auth-1
---
apiVersion: konnect.konghq.com/v1alpha1
kind: AIGatewayPolicy
metadata:
  name: aigw-policy-prompt-decorator
  namespace: default
spec:
  aiGatewayRef:
    type: namespacedRef
    namespacedRef:
      name: ai-gw-cp-1
      namespace: default
  apiSpec:
    displayName: "AIGateway Policy Prompt Decorator"
    # Name of the policy. The name must be unique within the control plane.
    name: "aigw-policy-prompt-decorator"
    # Type of the policy.
    type: "ai-prompt-decorator"
    enabled: "Enabled"
    # Set to "Enabled" to enable the policy globally.
    global: "Disabled"
    # Configuration for the policy. The configuration is specific to the policy type.
    config:
      type: "inline"
      value:
        llm_format: openai
        max_request_body_size: 8388608
        prompts:
          append: null
          prepend:
          - content: "In short words"
            role: user
