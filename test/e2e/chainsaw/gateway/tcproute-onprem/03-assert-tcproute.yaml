apiVersion: gateway.networking.k8s.io/v1
kind: TCPRoute
metadata:
  name: ($tcp_route_name)
  namespace: ($namespace)
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ($gateway_name)
      sectionName: tcp
status:
  parents:
    - parentRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: ($gateway_name)
        sectionName: tcp
       # Filter conditions array to check for all required conditions
      (conditions[?type == 'Accepted']):
        - status: 'True'
      (conditions[?type == 'ResolvedRefs']):
        - status: 'True'
      (conditions[?type == 'Programmed']):
        - status: 'True'
