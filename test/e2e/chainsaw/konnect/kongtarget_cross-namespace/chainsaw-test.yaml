        template: ../../common/_step_templates/apply-assert-kongreferencegrant.yaml

    - name: 52-assert-upstream5-and-target5-programmed
      description: |
        Assert both upstream5 and target5 are Programmed after both grants are in place.
        target5 has upstreamID set.
      timeouts:
        assert: 90s
      try:
        - assert:
            resource:
              apiVersion: configuration.konghq.com/v1alpha1
              kind: KongUpstream
              metadata:
                name: ($upstream5_name)
                namespace: ($namespace)
              status:
                (conditions[?type == 'Programmed']):
                  - status: 'True'
                    reason: Programmed
                (conditions[?type == 'ResolvedRefs']):
                  - status: 'True'
                    reason: ResolvedRefs
                (conditions[?type == 'ControlPlaneRefValid']):
                  - status: 'True'
                    reason: Valid
                (conditions[?type == 'APIAuthResolvedRef']):
                  - status: 'True'
                    reason: ResolvedRef
                (conditions[?type == 'APIAuthValid']):
                  - status: 'True'
                    reason: Valid
                (konnect.controlPlaneID != null): true
                (konnect.id != null): true
        - assert:
            resource:
              apiVersion: configuration.konghq.com/v1alpha1
              kind: KongTarget
              metadata:
                name: ($target5_name)
                namespace: ($target_namespace)
              status:
                (conditions[?type == 'Programmed']):
                  - status: 'True'
                    reason: Programmed
                (conditions[?type == 'KongUpstreamRefValid']):
                  - status: 'True'
                    reason: Valid
                (conditions[?type == 'ControlPlaneRefValid']):
                  - status: 'True'
                    reason: Valid
                (conditions[?type == 'APIAuthResolvedRef']):
                  - status: 'True'
                    reason: ResolvedRef
                (conditions[?type == 'APIAuthValid']):
                  - status: 'True'
                    reason: Valid
                (konnect.controlPlaneID != null): true
                (konnect.id != null): true
                (konnect.upstreamID != null): true

    - name: 53-cleanup-scenario-f
      description: |
        Delete target5 first, then remove the Target->Upstream grant.
        Delete upstream5, then remove the Upstream->CP grant.
        Delete cp5 last.
      timeouts:
        delete: 120s
        error: 120s
      try:
        - delete:
            ref:
              apiVersion: configuration.konghq.com/v1alpha1
              kind: KongTarget
              name: ($target5_name)
              namespace: ($target_namespace)
        - error:
            resource:
              apiVersion: configuration.konghq.com/v1alpha1
              kind: KongTarget
              metadata:
                name: ($target5_name)
                namespace: ($target_namespace)
        - delete:
            ref:
              apiVersion: configuration.konghq.com/v1alpha1
              kind: KongReferenceGrant
              name: (join('-', [$namespace, 'target5-to-upstream5']))
              namespace: ($namespace)
        - delete:
            ref:
              apiVersion: configuration.konghq.com/v1alpha1
              kind: KongUpstream
              name: ($upstream5_name)
              namespace: ($namespace)
        - error:
            resource:
              apiVersion: configuration.konghq.com/v1alpha1
              kind: KongUpstream
              metadata:
                name: ($upstream5_name)
                namespace: ($namespace)
        - delete:
            ref:
              apiVersion: configuration.konghq.com/v1alpha1
              kind: KongReferenceGrant
              name: (join('-', [$namespace, 'upstream5-to-cp5']))
              namespace: ($cp_namespace)
        - delete:
            ref:
              apiVersion: konnect.konghq.com/v1alpha2
              kind: KonnectGatewayControlPlane
              name: ($cp5_name)
              namespace: ($cp_namespace)
        - error:
            resource:
              apiVersion: konnect.konghq.com/v1alpha2
              kind: KonnectGatewayControlPlane
              metadata:
                name: ($cp5_name)
                namespace: ($cp_namespace)

  catch:
    - description: Capture debug snapshot
      script:
        env:
          - name: TEST_NAME
            value: kongtarget-cross-namespace
          - name: NAMESPACE
            value: ($namespace)
          - name: ADDITIONAL_NAMESPACES
            value: (join(',', [$cp_namespace, $auth_namespace, $target_namespace]))
          - name: OPERATOR_NAMESPACE
            value: kong-system
        content: |
          bash ../../common/scripts/debug_snapshot.sh
