                namespace: ($route_namespace)
        - delete:
            ref:
              apiVersion: configuration.konghq.com/v1alpha1
              kind: KongReferenceGrant
              name: (join('-', [$namespace, 'route5-to-svc5']))
              namespace: ($namespace)
        - delete:
            ref:
              apiVersion: configuration.konghq.com/v1alpha1
              kind: KongService
              name: ($svc5_name)
              namespace: ($namespace)
        - error:
            resource:
              apiVersion: configuration.konghq.com/v1alpha1
              kind: KongService
              metadata:
                name: ($svc5_name)
                namespace: ($namespace)
        - delete:
            ref:
              apiVersion: configuration.konghq.com/v1alpha1
              kind: KongReferenceGrant
              name: (join('-', [$namespace, 'svc5-to-cp5']))
              namespace: ($cp_namespace)
        - delete:
            ref:
              apiVersion: konnect.konghq.com/v1alpha2
              kind: KonnectGatewayControlPlane
              name: ($cp5_name)
              namespace: ($cp_namespace)
        - error:
            resource:
              apiVersion: konnect.konghq.com/v1alpha2
              kind: KonnectGatewayControlPlane
              metadata:
                name: ($cp5_name)
                namespace: ($cp_namespace)

  catch:
    - description: Capture debug snapshot
      script:
        env:
          - name: TEST_NAME
            value: kongroute-cross-namespace
          - name: NAMESPACE
            value: ($namespace)
          - name: ADDITIONAL_NAMESPACES
            value: (join(',', [$cp_namespace, $auth_namespace, $route_namespace]))
          - name: OPERATOR_NAMESPACE
            value: kong-system
        content: |
          bash ../../common/scripts/debug_snapshot.sh
