name: CRD validation tests

on:
  workflow_call:
    inputs:
      cluster_versions:
        description: "The Kubernetes cluster versions to use for envtest"
        type: string
        required: true

permissions:
  contents: read

env:
  MISE_VERBOSE: 1
  MISE_DEBUG: 1

jobs:
  crd-validation-tests:
    timeout-minutes: ${{ fromJSON(vars.GHA_DEFAULT_TIMEOUT || 10) }}
    runs-on: ubuntu-latest
    name: ${{ matrix.crd_validation_test.name }} - ${{ matrix.cluster_version }}
    strategy:
      fail-fast: false
      matrix:
        cluster_version: ${{ fromJson(inputs.cluster_versions) }}
        crd_validation_test:
        - name: root
          path: ./test/crdsvalidation
        - name: aigateway.konghq.com
          path: ./test/crdsvalidation/aigateway.konghq.com/...
        - name: configuration.konghq.com
          path: ./test/crdsvalidation/configuration.konghq.com/...
        - name: eventgateway.konghq.com
          path: ./test/crdsvalidation/eventgateway.konghq.com/...
        - name: gateway-operator.konghq.com
          path: ./test/crdsvalidation/gateway-operator.konghq.com/...
        - name: konnect.konghq.com
          path: ./test/crdsvalidation/konnect.konghq.com/...
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
      with:
        egress-policy: audit
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: go.mod
        cache: false
    - run: echo "GO_MOD_CACHE=$(go env GOMODCACHE)" >> $GITHUB_ENV
    - run: echo "GO_BUILD_CACHE=$(go env GOCACHE)" >> $GITHUB_ENV

    - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      with:
        install: false

    - run: echo "GO_CACHE_KEY=go-crdsvalidationtests-${{ runner.os }}-${{ runner.arch }}-go-${{ hashFiles('**/go.mod') }}" >> $GITHUB_ENV
    - run: echo "GO_CACHE_KEY_2=go-crdsvalidationtests-${{ runner.os }}-${{ runner.arch }}-go-" >> $GITHUB_ENV

    - name: Go cache main branch
      if: ${{ github.ref == 'refs/heads/main' }}
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
      with:
        path: |
          ${{ env.GO_MOD_CACHE }}
          ${{ env.GO_BUILD_CACHE }}
        key: ${{ env.GO_CACHE_KEY }}
        restore-keys: |
          ${{ env.GO_CACHE_KEY }}
          ${{ env.GO_CACHE_KEY_2 }}

    - name: Go cache (restore only for non-main branches)
      if: ${{ github.ref != 'refs/heads/main' }}
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
      with:
        path: |
          ${{ env.GO_MOD_CACHE }}
          ${{ env.GO_BUILD_CACHE }}
        key: ${{ env.GO_CACHE_KEY }}
        restore-keys: |
          ${{ env.GO_CACHE_KEY }}
          ${{ env.GO_CACHE_KEY_2 }}

    - name: Run the crds validation tests
      env:
        GO_TEST_PARALLEL: 2
      run: |
        VERSION="${{ matrix.cluster_version }}"
        # Remove leading 'v'
        VERSION="${VERSION#v}"
        # Remove patch number as envtest releases are not provided for every patch version
        VERSION="${VERSION%.*}"
        echo "Cluster version: $VERSION"
        make test.crds-validation \
          CLUSTER_VERSION=${VERSION} \
          CRDS_VALIDATION_TEST_PATHS="${{ matrix.crd_validation_test.path }}"

    - name: Run the API tests
      if: ${{ matrix.crd_validation_test.name == 'root' }}
      run: make test.api
