# Template for creating and asserting a KongCACertificate sourced from an existing Secret.
#
# The referenced Secret must contain a key named 'ca.crt'.
#
# Required bindings:
#   - ca_cert_name: Name of the KongCACertificate to create.
#   - ca_cert_namespace: Namespace where the KongCACertificate will be created.
#   - secret_name: Name of the Secret holding the CA certificate (under key 'ca.crt').
#   - secret_namespace: Namespace of the Secret.
#   - cp_name: Name of the KonnectGatewayControlPlane to reference.
#   - cp_ref_namespace: Namespace of the KonnectGatewayControlPlane.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: StepTemplate
metadata:
  name: apply-assert-kong-ca-certificate
spec:
  try:
    - apply:
        resource:
          apiVersion: configuration.konghq.com/v1alpha1
          kind: KongCACertificate
          metadata:
            name: ($ca_cert_name)
            namespace: ($ca_cert_namespace)
          spec:
            type: secretRef
            controlPlaneRef:
              type: konnectNamespacedRef
              konnectNamespacedRef:
                name: ($cp_name)
                namespace: ($cp_ref_namespace)
            secretRef:
              name: ($secret_name)
              namespace: ($secret_namespace)
    - assert:
        resource:
          apiVersion: configuration.konghq.com/v1alpha1
          kind: KongCACertificate
          metadata:
            name: ($ca_cert_name)
            namespace: ($ca_cert_namespace)
          status:
            (conditions[?type == 'Programmed']):
              - status: 'True'
                reason: Programmed
            (konnect.id != null): true
