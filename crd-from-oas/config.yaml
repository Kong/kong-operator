apiGroupVersions:
  konnect.konghq.com/v1alpha1:
    categories:
      - konnect
      - kong
    # Don't generate groupversion_info.go for this API group — it is hand-written.
    # zz_generated_groupversion_info.go (addKnownTypesGenerated) is still emitted.
    generateGroupVersionInfo: false
    commonTypes:
      objectRef:
        import:
          path: github.com/kong/kong-operator/v2/api/common/v1alpha1
          alias: commonv1alpha1
    types:
      # Event Gateway APIs
      - path: /v1/event-gateways
        name: KonnectEventGateway
        ops:
          sdk:
            interface: github.com/Kong/sdk-konnect-go.EventGatewaysSDK
            fieldName: EventGateways
          create:
            path: github.com/Kong/sdk-konnect-go/models/components.CreateGatewayRequest
          update:
            path: github.com/Kong/sdk-konnect-go/models/components.UpdateGatewayRequest
          delete: {}
        reconciler: {}
      - path: /v1/event-gateways/{gatewayId}/data-plane-certificates
        name: KonnectEventDataPlaneCertificate
        secretReferences:
          - path: spec.apiSpec.certificate
            type: Secret
            key: tls.crt
        ops:
          sdk:
            interface: github.com/Kong/sdk-konnect-go.EventGatewayDataPlaneCertificatesSDK
            fieldName: EventGatewayDataPlaneCertificates
          requireClient: true
          getForUID:
            matchFields:
              - objectField: Spec.APISpec.Certificate
                responseField: Certificate
              - objectField: Spec.APISpec.Name
                responseField: Name
              - objectField: Spec.APISpec.Description
                responseField: Description
          create:
            path: github.com/Kong/sdk-konnect-go/models/components.CreateEventGatewayDataPlaneCertificateRequest
          update:
            path: github.com/Kong/sdk-konnect-go/models/components.UpdateEventGatewayDataPlaneCertificateRequest
          delete: {}
        reconciler:
          parentEntityType: KonnectEventGateway
      - path: /v1/event-gateways/{gatewayId}/listeners
        name: EventGatewayListener
        ops:
          sdk:
            interface: github.com/Kong/sdk-konnect-go.EventGatewayListenersSDK
            fieldName: EventGatewayListeners
          create:
            path: github.com/Kong/sdk-konnect-go/models/components.CreateEventGatewayListenerRequest
          update:
            path: github.com/Kong/sdk-konnect-go/models/components.UpdateEventGatewayListenerRequest
          delete: {}
        reconciler:
          parentEntityType: KonnectEventGateway
      - path: /v1/event-gateways/{gatewayId}/listeners/{eventGatewayListenerId}/policies
        name: EventGatewayListenerPolicy
        secretReferences:
          - path: spec.apiSpec.tlsServer.config.certificates[].certificate
            type: Secret
            key: tls.crt
          - path: spec.apiSpec.tlsServer.config.certificates[].key
            type: Secret
            key: tls.key
        ops:
          sdk:
            interface: github.com/Kong/sdk-konnect-go.EventGatewayListenerPoliciesSDK
            fieldName: EventGatewayListenerPolicies
          getForUID:
            listItemsSource: slice
            rootUnion:
              unionField: Spec.APISpec.EventGatewayListenerPolicyConfig
              cases:
                - typeValue: tlsServer
                  variantField: EventGatewayTLSListen
                  responseTypeValue: tls_server
                  matchFields:
                    - objectField: Name
                      responseField: GetName()
                - typeValue: forwardToVirtualCluster
                  variantField: ForwardToVirtualClust
                  responseTypeValue: forward_to_virtual_cluster
                  matchFields:
                    - objectField: Name
                      responseField: GetName()
          create:
            path: github.com/Kong/sdk-konnect-go/models/operations.CreateEventGatewayListenerPolicyRequest
          update:
            path: github.com/Kong/sdk-konnect-go/models/operations.UpdateEventGatewayListenerPolicyRequest
          delete: {}
        reconciler:
          parentEntityType: EventGatewayListener
          ancestorEntityTypes:
            - KonnectEventGateway
          # Speakeasy SDK uses "ListenerID" (not "EventGatewayListenerID") for the
          # eventGatewayListenerId path param when it appears as a parent (not entity ID).
          parentSDKFields:
            - GatewayID
            - ListenerID
      - path: /v1/event-gateways/{gatewayId}/backend-clusters
        name: EventGatewayBackendCluster
        cel:
          spec:
            apiSpec:
              tls:
                caBundle:
                  _validations:
                    - "+kubebuilder:validation:MaxLength=4096"
        ops:
          sdk:
            interface: github.com/Kong/sdk-konnect-go.EventGatewayBackendClustersSDK
            fieldName: EventGatewayBackendClusters
          create:
            path: github.com/Kong/sdk-konnect-go/models/components.CreateBackendClusterRequest
          update:
            path: github.com/Kong/sdk-konnect-go/models/components.UpdateBackendClusterRequest
          delete: {}
        reconciler:
          parentEntityType: KonnectEventGateway
        secretReferences:
          - path: spec.apiSpec.tls.clientIdentity.certificate
            type: Secret
            key: tls.crt
          - path: spec.apiSpec.tls.clientIdentity.key
            type: Secret
            key: tls.key
      - path: /v1/event-gateways/{gatewayId}/virtual-clusters
        name: EventGatewayVirtualCluster
        ops:
          sdk:
            interface: github.com/Kong/sdk-konnect-go.EventGatewayVirtualClustersSDK
            fieldName: EventGatewayVirtualClusters
          create:
            path: github.com/Kong/sdk-konnect-go/models/components.CreateVirtualClusterRequest
          update:
            path: github.com/Kong/sdk-konnect-go/models/components.UpdateVirtualClusterRequest
          delete: {}
        reconciler:
          parentEntityType: EventGatewayBackendCluster
          parentRef:
            fieldName: eventGatewayBackendClusterRef
            replacesAPISpecField: destination
          ancestorEntityTypes:
            - KonnectEventGateway
      - path: /v1/event-gateways/{gatewayId}/virtual-clusters/{virtualClusterId}/consume-policies
        name: EventGatewayVirtualClusterConsumePolicy
        ops:
          sdk:
            interface: github.com/Kong/sdk-konnect-go.EventGatewayVirtualClusterConsumePoliciesSDK
            fieldName: EventGatewayVirtualClusterConsumePolicies
          create:
            path: github.com/Kong/sdk-konnect-go/models/operations.CreateEventGatewayVirtualClusterConsumePolicyRequest
          update:
            path: github.com/Kong/sdk-konnect-go/models/operations.UpdateEventGatewayVirtualClusterConsumePolicyRequest
          delete: {}
        reconciler:
          parentEntityType: EventGatewayVirtualCluster
          parentRef:
            fieldName: eventGatewayVirtualClusterRef
          ancestorEntityTypes:
            - KonnectEventGateway
      - path: /v1/event-gateways/{gatewayId}/virtual-clusters/{virtualClusterId}/produce-policies
        name: EventGatewayVirtualClusterProducePolicy
        ops:
          sdk:
            interface: github.com/Kong/sdk-konnect-go.EventGatewayVirtualClusterProducePoliciesSDK
            fieldName: EventGatewayVirtualClusterProducePolicies
          create:
            path: github.com/Kong/sdk-konnect-go/models/operations.CreateEventGatewayVirtualClusterProducePolicyRequest
          update:
            path: github.com/Kong/sdk-konnect-go/models/operations.UpdateEventGatewayVirtualClusterProducePolicyRequest
          delete: {}
        reconciler:
          parentEntityType: EventGatewayVirtualCluster
          parentRef:
            fieldName: eventGatewayVirtualClusterRef
          ancestorEntityTypes:
            - KonnectEventGateway

      # Portal APIs
      - path: /v3/portals
        cel:
          spec:
            apiSpec:
              name:
                _validations:
                  - "+kubebuilder:validation:XValidation:rule=\"self == oldSelf\",message=\"name is immutable\""
        ops:
          sdk:
            interface: github.com/Kong/sdk-konnect-go.PortalsSDK
            fieldName: Portals
          create:
            path: github.com/Kong/sdk-konnect-go/models/components.CreatePortal
          update:
            path: github.com/Kong/sdk-konnect-go/models/components.UpdatePortal
          delete: {}
        reconciler: {}
      - path: /v3/portals/{portalId}/identity-providers
        ops:
          sdk:
            interface: github.com/Kong/sdk-konnect-go.PortalAuthSettingsSDK
            fieldName: PortalAuthSettings
          # The SDK list endpoint uses positional args and response items lack
          # labels/tags, and there is no deterministic field-match strategy for
          # the nested identity-provider config union yet. See
          # https://github.com/Kong/kong-operator/issues/3987.
          skipGetForUID: true
          create:
            path: github.com/Kong/sdk-konnect-go/models/components.PortalCreateIdentityProvider
          update:
            path: github.com/Kong/sdk-konnect-go/models/components.PortalUpdateIdentityProvider
          delete: {}
        reconciler: {}
      - path: /v3/portals/{portalId}/teams
        ops:
          getForUID:
            # Portal teams do not expose labels/tags in Konnect list responses,
            # so recover conflicts by matching the stable spec fields that are
            # echoed back by the API. Only the immutable identifier (name) is
            # used here; user-mutable fields like description are left to the
            # subsequent update reconciliation. This mitigates
            # https://github.com/Kong/kong-operator/issues/3987.
            matchFields:
              - objectField: Spec.APISpec.Name
                responseField: GetName()
          sdk:
            interface: github.com/Kong/sdk-konnect-go.PortalTeamsSDK
            fieldName: PortalTeams
          create:
            path: github.com/Kong/sdk-konnect-go/models/components.PortalCreateTeamRequest
          update:
            path: github.com/Kong/sdk-konnect-go/models/components.PortalUpdateTeamRequest
          delete: {}
        reconciler: {}
      - path: /v3/portals/{portalId}/pages
        cel:
          spec:
            apiSpec:
              parentPageIDRef:
                _validations:
                  # TODO: https://github.com/Kong/kong-operator/issues/4008
                  - "+kubebuilder:validation:XValidation:rule=\"self == null\",message=\"cannot set parentPageIDRef\""
        ops:
          getForUID:
            # Portal pages do not expose labels/tags in Konnect list responses;
            # match on the immutable slug (unique within a portal) so user
            # edits to title/description don't break conflict recovery. This
            # mitigates https://github.com/Kong/kong-operator/issues/3987.
            matchFields:
              - objectField: Spec.APISpec.Slug
                responseField: GetSlug()
          sdk:
            interface: github.com/Kong/sdk-konnect-go.PortalPagesSDK
            fieldName: PortalPages
          create:
            path: github.com/Kong/sdk-konnect-go/models/components.CreatePortalPageRequest
          update:
            path: github.com/Kong/sdk-konnect-go/models/components.UpdatePortalPageRequest
          delete: {}
        reconciler: {}
      - path: /v3/portals/{portalId}/email-config
        name: PortalEmailConfig
        ops:
          # PortalEmailConfig is a singleton per portal; the generator emits a
          # singular GET that returns the only entry, so no matchFields config
          # is needed. Any spec drift is reconciled by the subsequent update.
          # This mitigates https://github.com/Kong/kong-operator/issues/3987.
          sdk:
            interface: github.com/Kong/sdk-konnect-go.PortalEmailsSDK
            fieldName: PortalEmails
          create:
            path: github.com/Kong/sdk-konnect-go/models/components.PostPortalEmailConfig
          update:
            path: github.com/Kong/sdk-konnect-go/models/components.PatchPortalEmailConfig
          delete: {}
        reconciler: {}
      - path: /v3/portals/{portalId}/ip-allow-list
        name: PortalIPAllowList
        ops:
          getForUID:
            # Designates the field on the object to compare when using a fallback
            # because this type in Konnect doesn't support tags or labels.
            matchFields:
              - objectField: Spec.APISpec.AllowedIps 
                responseField: AllowedIps
          sdk:
            interface: github.com/Kong/sdk-konnect-go.PortalsIPAllowListSDK
            fieldName: PortalsIPAllowList
          create:
            path: github.com/Kong/sdk-konnect-go/models/components.CreatePortalSourceIPRestriction
          update:
            path: github.com/Kong/sdk-konnect-go/models/operations.PutPortalIPAllowListRequest
          delete: {}
        reconciler: {}
      - path: /v3/portals/{portalId}/custom-domain
        name: PortalCustomDomain
        cel:
          spec:
            apiSpec:
              ssl:
                withCustomCertificate:
                  customCertificate:
                     _validations:
                      - "+kubebuilder:validation:MaxLength=4096"
                  customPrivateKey:
                     _validations:
                      - "+kubebuilder:validation:MaxLength=4096"
        ops:
          sdk:
            interface: github.com/Kong/sdk-konnect-go.PortalCustomDomainsSDK
            fieldName: PortalCustomDomains
          getForUID:
            matchFields:
              - objectField: Spec.APISpec.Hostname
                responseField: Hostname
          create:
            path: github.com/Kong/sdk-konnect-go/models/components.CreatePortalCustomDomainRequest
          update:
            path: github.com/Kong/sdk-konnect-go/models/components.UpdatePortalCustomDomainRequest
          delete: {}
        reconciler: {}
      - path: /v3/portals/{portalId}/customization
        name: PortalCustomization
        ops:
          sdk:
            interface: github.com/Kong/sdk-konnect-go.PortalCustomizationSDK
            fieldName: PortalCustomization
          create:
            path: github.com/Kong/sdk-konnect-go/models/components.PortalCustomization
          update:
            path: github.com/Kong/sdk-konnect-go/models/components.PortalCustomization
          delete:
            asPUT: true
        reconciler: {}
