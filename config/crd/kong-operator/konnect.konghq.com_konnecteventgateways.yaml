---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    kubernetes-configuration.konghq.com/channels: kong-operator
    kubernetes-configuration.konghq.com/version: v2.1.0
  name: konnecteventgateways.konnect.konghq.com
spec:
  group: konnect.konghq.com
  names:
    categories:
    - kong
    - konnect
    kind: KonnectEventGateway
    listKind: KonnectEventGatewayList
    plural: konnecteventgateways
    shortNames:
    - keg
    singular: konnecteventgateway
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: The Resource is Programmed on Konnect
      jsonPath: .status.conditions[?(@.type=='Programmed')].status
      name: Programmed
      type: string
    - description: Konnect ID
      jsonPath: .status.id
      name: ID
      type: string
    - description: Konnect Organization ID this resource belongs to.
      jsonPath: .status.organizationID
      name: OrgID
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          KonnectEventGateway is the Schema for the Konnect Event Gateways API.
          It represents an Event Gateway in Konnect, backed by the /v1/event-gateways API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec defines the desired state of KonnectEventGateway.
            properties:
              createGatewayRequest:
                description: |-
                  CreateGatewayRequest groups all fields sent to POST /v1/event-gateways.
                  Only applicable when source is Origin.
                properties:
                  description:
                    description: Description is a human-readable description of the
                      Event Gateway.
                    maxLength: 512
                    type: string
                  labels:
                    additionalProperties:
                      type: string
                    description: Labels are metadata key-value pairs for filtering
                      and searching.
                    type: object
                  minRuntimeVersion:
                    description: |-
                      MinRuntimeVersion is the minimum keg version that can connect to this gateway.
                      Must match the pattern X.Y (e.g. "1.1").
                    pattern: ^\d+\.\d+$
                    type: string
                  name:
                    description: Name is the human-readable name of the Event Gateway.
                    maxLength: 255
                    minLength: 1
                    type: string
                required:
                - name
                type: object
                x-kubernetes-validations:
                - message: spec.createGatewayRequest.labels must not have more than
                    40 entries
                  rule: '!has(self.labels) || size(self.labels) <= 40'
                - message: spec.createGatewayRequest.labels keys must be of length
                    1-63 characters
                  rule: '!has(self.labels) || self.labels.all(key, size(key) >= 1
                    && size(key) <= 63)'
                - message: spec.createGatewayRequest.labels values must be of length
                    1-63 characters
                  rule: '!has(self.labels) || self.labels.all(key, size(self.labels[key])
                    >= 1 && size(self.labels[key]) <= 63)'
                - message: spec.createGatewayRequest.labels keys must not start with
                    'kong', 'konnect', 'mesh', 'kic' or '_'
                  rule: '!has(self.labels) || self.labels.all(key, !key.startsWith(''kong'')
                    && !key.startsWith(''konnect'') && !key.startsWith(''mesh'') &&
                    !key.startsWith(''kic'') && !key.startsWith(''_''))'
              konnect:
                description: KonnectConfiguration contains the Konnect API authentication
                  configuration.
                properties:
                  name:
                    description: Name is the name of the KonnectAPIAuthConfiguration
                      resource.
                    minLength: 1
                    type: string
                  namespace:
                    description: |-
                      Namespace is the namespace of the KonnectAPIAuthConfiguration resource.
                      If not specified, defaults to the same namespace as the KonnectConfiguration resource.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              mirror:
                description: |-
                  Mirror holds the configuration for a mirrored Event Gateway.
                  Only applicable when source is Mirror.
                properties:
                  konnect:
                    description: Konnect contains the ID of the existing Event Gateway
                      in Konnect.
                    properties:
                      id:
                        description: ID is the UUID of the existing Event Gateway
                          in Konnect.
                        maxLength: 36
                        pattern: ^[0-9a-f]{8}(?:\-[0-9a-f]{4}){3}-[0-9a-f]{12}$
                        type: string
                    required:
                    - id
                    type: object
                required:
                - konnect
                type: object
              source:
                default: Origin
                description: |-
                  Source represents the source type of the Konnect entity.
                  Origin means the operator owns the lifecycle — it creates, updates, and deletes the Event
                  Gateway in Konnect. Mirror means the Event Gateway already exists in Konnect and the
                  operator only reads its state and populates the status.
                enum:
                - Origin
                - Mirror
                type: string
            type: object
            x-kubernetes-validations:
            - message: spec.source is immutable
              rule: self.source == oldSelf.source
            - message: spec.createGatewayRequest cannot be set when source is Mirror
              rule: 'self.source == ''Mirror'' ? !has(self.createGatewayRequest) :
                true'
            - message: spec.createGatewayRequest with name must be set when source
                is Origin
              rule: 'self.source == ''Origin'' ? has(self.createGatewayRequest) :
                true'
            - message: spec.mirror must be set when source is Mirror
              rule: 'self.source == ''Mirror'' ? has(self.mirror) : true'
            - message: spec.mirror cannot be set when source is Origin
              rule: 'self.source == ''Origin'' ? !has(self.mirror) : true'
          status:
            description: Status defines the observed state of KonnectEventGateway.
            properties:
              conditions:
                default:
                - lastTransitionTime: "1970-01-01T00:00:00Z"
                  message: Waiting for controller
                  reason: Pending
                  status: Unknown
                  type: Programmed
                description: |-
                  Conditions describe the current conditions of the KonnectEventGateway.

                  Known condition types are:

                  * "Programmed"
                  * "APIAuthValid"
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                maxItems: 8
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              id:
                description: |-
                  ID is the unique identifier of the Konnect entity as assigned by Konnect API.
                  If it's unset (empty string), it means the Konnect entity hasn't been created yet.
                type: string
              organizationID:
                description: OrgID is ID of Konnect Org that this entity has been
                  created in.
                type: string
              serverURL:
                description: ServerURL is the URL of the Konnect server in which the
                  entity exists.
                type: string
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: spec.konnect is immutable when an entity is already Programmed
          rule: '(!has(self.status) || !has(self.status.conditions) || !self.status.conditions.exists(c,
            c.type == ''Programmed'' && c.status == ''True'')) ? true : self.spec.konnect
            == oldSelf.spec.konnect'
        - message: spec.konnect is immutable when an entity refers to a Valid API
            Auth Configuration
          rule: '(!has(self.status) || !has(self.status.conditions) || !self.status.conditions.exists(c,
            c.type == ''APIAuthValid'' && c.status == ''True'')) ? true : self.spec.konnect
            == oldSelf.spec.konnect'
    served: true
    storage: true
    subresources:
      status: {}
