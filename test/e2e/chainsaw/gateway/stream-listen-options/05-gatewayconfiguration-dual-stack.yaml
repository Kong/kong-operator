# GatewayConfiguration setting a dual-stack KONG_STREAM_LISTEN (IPv4 + IPv6).
# The operator must preserve both bind addresses (and their options) for the TLS
# listener port, enforcing only the port and the ssl token.
apiVersion: gateway-operator.konghq.com/v2beta1
kind: GatewayConfiguration
metadata:
  name: (join('-', [($test_name), 'gateway-configuration']))
  namespace: ($namespace)
spec:
  dataPlaneOptions:
    deployment:
      podTemplateSpec:
        spec:
          containers:
            - name: proxy
              image: ($gateway_image)
              env:
                - name: KONG_STREAM_LISTEN
                  value: "0.0.0.0:8899 ssl reuseport, [::]:8899 ssl reuseport"
              readinessProbe:
                failureThreshold: 3
                initialDelaySeconds: 1
                periodSeconds: 1
                successThreshold: 1
                timeoutSeconds: 1
                httpGet:
                  path: /status/ready
                  port: 8100
                  scheme: HTTP
