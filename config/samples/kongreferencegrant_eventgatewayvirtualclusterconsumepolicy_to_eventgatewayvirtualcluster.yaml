kind: EventGatewayVirtualCluster
apiVersion: configuration.konghq.com/v1alpha1
metadata:
  name: shared-virtual-cluster
  namespace: event-virtual-clusters
spec:
  eventGatewayBackendClusterRef:
    type: namespacedRef
    namespacedRef:
      name: shared-backend-cluster
      namespace: event-gateways
  apiSpec:
    name: shared-virtual-cluster
    description: Virtual Cluster referencing a cross-namespace BackendCluster
    labels:
      app: sample
      env: demo
    aclMode: enforce_on_gateway
    authentication:
      - type: anonymous
    dnsLabel: shared-virtual-cluster
    namespace:
      mode: enforce_prefix
      prefix: sample
      additional:
        consumerGroups:
          - type: glob
            glob:
              glob: group-*
        topics:
          - type: glob
            glob:
              glob: topic-*
---
kind: EventGatewayVirtualClusterConsumePolicy
apiVersion: configuration.konghq.com/v1alpha1
metadata:
  name: shared-consume-policy
  namespace: event-policies
spec:
  eventGatewayVirtualClusterRef:
    type: namespacedRef
    namespacedRef:
      name: shared-virtual-cluster
      namespace: event-virtual-clusters
  apiSpec:
    type: modifyHeaders
    modifyHeaders:
      name: shared-consume-policy
      labels:
        app: sample
        env: demo
      description: ConsumePolicy referencing a cross-namespace VirtualCluster
      config:
        actions:
          - op: set
            set:
              key: x-added-header
              value: added-value
