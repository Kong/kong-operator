# Template for creating and asserting a KonnectAPIAuthConfiguration.
#
# Required bindings:
#   - auth_name: Name of the KonnectAPIAuthConfiguration to create.
#   - auth_namespace: Namespace where the KonnectAPIAuthConfiguration will be created.
#   - auth_secret_name: Name of the Secret to reference.
#   - auth_secret_namespace: Namespace of the Secret to reference.
#   - url: Konnect server URL (e.g., "eu.api.konghq.tech").
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: StepTemplate
metadata:
  name: apply-assert-konnect-auth
spec:
  try:
    - apply:
        resource:
          apiVersion: konnect.konghq.com/v1alpha1
          kind: KonnectAPIAuthConfiguration
          metadata:
            name: ($auth_name)
            namespace: ($auth_namespace)
          spec:
            type: secretRef
            secretRef:
              name: ($auth_secret_name)
              namespace: ($auth_secret_namespace)
            serverURL: ($url)
    - assert:
        resource:
          apiVersion: konnect.konghq.com/v1alpha1
          kind: KonnectAPIAuthConfiguration
          metadata:
            name: ($auth_name)
            namespace: ($auth_namespace)
          spec:
            type: secretRef
            secretRef:
              name: ($auth_secret_name)
              namespace: ($auth_secret_namespace)
            serverURL: ($url)
          # Assert that the resource was accepted (adjust based on actual status field)
          status:
            (conditions[?type == 'APIAuthValid']):
              - status: 'True'
                reason: Valid
            serverURL: (join('', ['https://', ($url)]))
