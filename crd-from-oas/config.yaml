apiGroupVersions:
  konnect.konghq.com/v1alpha1:
    # Don't generate GroupVersionInfo for this API group, as it already has it defined.
    # We might do this in the future to replace the manually defined one.
    generateGroupVersionInfo: false
    commonTypes:
      objectRef:
        import:
          path: github.com/kong/kong-operator/v2/api/common/v1alpha1
          alias: commonv1alpha1
    types:
      # Event Gateway APIs
      - path: /v1/event-gateways
        name: KonnectEventGateway
        ops:
          sdk:
            interface: github.com/Kong/sdk-konnect-go.EventGatewaysSDK
            fieldName: EventGateways
          create:
            path: github.com/Kong/sdk-konnect-go/models/components.CreateGatewayRequest
          update:
            path: github.com/Kong/sdk-konnect-go/models/components.UpdateGatewayRequest
          delete: {}
        reconciler:
          isRoot: true
      - path: /v1/event-gateways/{gatewayId}/data-plane-certificates
        name: KonnectEventDataPlaneCertificate
        optionalSecretReference: true
        ops:
          sdk:
            interface: github.com/Kong/sdk-konnect-go.EventGatewayDataPlaneCertificatesSDK
            fieldName: EventGatewayDataPlaneCertificates
          requireClient: true
          getForUID:
            matchFields:
              - objectField: Spec.APISpec.Certificate
                responseField: Certificate
              - objectField: Spec.APISpec.Name
                responseField: Name
              - objectField: Spec.APISpec.Description
                responseField: Description
          create:
            path: github.com/Kong/sdk-konnect-go/models/components.CreateEventGatewayDataPlaneCertificateRequest
          update:
            path: github.com/Kong/sdk-konnect-go/models/components.UpdateEventGatewayDataPlaneCertificateRequest
          delete: {}
        reconciler:
          isRoot: false
          parentEntityType: KonnectEventGateway
      - path: /v1/event-gateways/{gatewayId}/listeners
        name: EventGatewayListener
        ops:
          sdk:
            interface: github.com/Kong/sdk-konnect-go.EventGatewayListenersSDK
            fieldName: EventGatewayListeners
          create:
            path: github.com/Kong/sdk-konnect-go/models/components.CreateEventGatewayListenerRequest
          update:
            path: github.com/Kong/sdk-konnect-go/models/components.UpdateEventGatewayListenerRequest
          delete: {}
        reconciler:
          isRoot: false
          parentEntityType: KonnectEventGateway
      - path: /v1/event-gateways/{gatewayId}/listeners/{eventGatewayListenerId}/policies
        name: EventGatewayListenerPolicy
        cel:
          EventGatewayTLSListenerPolicy:
            config:
              certificates:
                certificate:
                   _validations:
                    - "+kubebuilder:validation:MaxLength=4096"
                key:
                   _validations:
                    - "+kubebuilder:validation:MaxLength=4096"
        ops:
          sdk:
            interface: github.com/Kong/sdk-konnect-go.EventGatewayListenerPoliciesSDK
            fieldName: EventGatewayListenerPolicies
          create:
            path: github.com/Kong/sdk-konnect-go/models/operations.CreateEventGatewayListenerPolicyRequest
          update:
            path: github.com/Kong/sdk-konnect-go/models/operations.UpdateEventGatewayListenerPolicyRequest
          delete: {}
        reconciler:
          isRoot: false
          parentEntityType: EventGatewayListener
          # Speakeasy SDK uses "ListenerID" (not "EventGatewayListenerID") for the
          # eventGatewayListenerId path param when it appears as a parent (not entity ID).
          parentSDKFields:
            - GatewayID
            - ListenerID
      - path: /v1/event-gateways/{gatewayId}/backend-clusters
        name: EventGatewayBackendCluster
        cel:
          tls:
            ca_bundle:
               _validations:
                - "+kubebuilder:validation:MaxLength=4096"
            client_identity:
              certificate:
                 _validations:
                  - "+kubebuilder:validation:MaxLength=4096"
              key:
                 _validations:
                  - "+kubebuilder:validation:MaxLength=4096"
        ops:
          sdk:
            interface: github.com/Kong/sdk-konnect-go.EventGatewayBackendClustersSDK
            fieldName: EventGatewayBackendClusters
          create:
            path: github.com/Kong/sdk-konnect-go/models/components.CreateBackendClusterRequest
          update:
            path: github.com/Kong/sdk-konnect-go/models/components.UpdateBackendClusterRequest
          delete: {}
        reconciler:
          isRoot: false
          parentEntityType: KonnectEventGateway
      - path: /v1/event-gateways/{gatewayId}/virtual-clusters
        name: EventGatewayVirtualCluster
        ops:
          sdk:
            interface: github.com/Kong/sdk-konnect-go.EventGatewayVirtualClustersSDK
            fieldName: EventGatewayVirtualClusters
          create:
            path: github.com/Kong/sdk-konnect-go/models/components.CreateVirtualClusterRequest
          update:
            path: github.com/Kong/sdk-konnect-go/models/components.UpdateVirtualClusterRequest
          delete: {}
        reconciler:
          isRoot: false
          parentEntityType: KonnectEventGateway

      # Portal APIs
      - path: /v3/portals
        cel:
          name:
            _validations:
              - "+kubebuilder:validation:XValidation:rule=\"self == oldSelf\",message=\"name is immutable\""
        ops:
          sdk:
            interface: github.com/Kong/sdk-konnect-go.PortalsSDK
            fieldName: Portals
          create:
            path: github.com/Kong/sdk-konnect-go/models/components.CreatePortal
          update:
            path: github.com/Kong/sdk-konnect-go/models/components.UpdatePortal
          delete: {}
        reconciler:
          isRoot: true
      - path: /v3/portals/{portalId}/identity-providers
        ops:
          sdk:
            interface: github.com/Kong/sdk-konnect-go.PortalAuthSettingsSDK
            fieldName: PortalAuthSettings
          # The SDK list endpoint uses positional args and response items lack
          # labels/tags, and there is no deterministic field-match strategy yet.
          skipGetForUID: true
          create:
            path: github.com/Kong/sdk-konnect-go/models/components.CreateIdentityProvider
          update:
            path: github.com/Kong/sdk-konnect-go/models/components.UpdateIdentityProvider
          delete: {}
        reconciler:
          isRoot: false
      - path: /v3/portals/{portalId}/teams
        ops:
          sdk:
            interface: github.com/Kong/sdk-konnect-go.PortalTeamsSDK
            fieldName: PortalTeams
          create:
            path: github.com/Kong/sdk-konnect-go/models/components.PortalCreateTeamRequest
          update:
            path: github.com/Kong/sdk-konnect-go/models/components.PortalUpdateTeamRequest
        reconciler:
          isRoot: false
      - path: /v3/portals/{portalId}/pages
        cel:
          parent_page_id:
              _validations:
                # TODO: https://github.com/Kong/kong-operator/issues/4008
                - "+kubebuilder:validation:XValidation:rule=\"self == null\",message=\"cannot set parent_page_id_ref\""
        ops:
          sdk:
            interface: github.com/Kong/sdk-konnect-go.PortalPagesSDK
            fieldName: PortalPages
          create:
            path: github.com/Kong/sdk-konnect-go/models/components.CreatePortalPageRequest
          update:
            path: github.com/Kong/sdk-konnect-go/models/components.UpdatePortalPageRequest
          delete: {}
        reconciler:
          isRoot: false
